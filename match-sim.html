<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Simulator — The Gomi Cup</title>
<link rel="stylesheet" href="./css/style.css">
<style>
  nav.topnav { display:flex; gap:12px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
  nav.topnav a { color:#cbd5e1; text-decoration:none; padding:8px 16px; border-radius:6px; background:rgba(30,41,59,0.6); font-size:0.9rem; }
  nav.topnav a:hover, nav.topnav a.active { background:#fbbf24; color:#0f172a; }

  .sim-header {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center;
    padding: 16px; background: rgba(15,23,42,0.7); border-radius: 12px; margin-bottom: 12px;
  }
  .team-tag { display: flex; align-items: center; gap: 10px; }
  .team-tag.away { flex-direction: row-reverse; text-align: right; }
  .team-tag .swatch { width: 20px; height: 20px; border-radius: 4px; }
  .team-tag .name { font-weight: 900; color: #fff; font-size: 1.1rem; }
  .score-box { text-align: center; }
  .score-big { font-size: 3rem; font-weight: 900; line-height: 1; color: #fbbf24; letter-spacing: 4px; }
  .set-info { font-size: 0.75rem; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .sets-row { display: flex; gap: 6px; justify-content: center; margin-top: 4px; }
  .set-pill { padding: 2px 8px; background: rgba(255,255,255,0.08); border-radius: 10px; font-size: 0.75rem; color: #cbd5e1; font-weight: 700; }
  .set-pill.won { background: #22c55e; color: #052e16; }

  .court-wrap {
    position: relative;
    max-width: 1000px;
    margin: 0 auto 16px;
    aspect-ratio: 18 / 9;
    background: linear-gradient(180deg, #b16050 0%, #a05141 100%);
    border: 3px solid #fff;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  /* Horizontal court: net is a vertical stripe down the middle; attack lines are vertical too. */
  .court-wrap .net { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 4px; background: repeating-linear-gradient(0deg, #fff 0 8px, transparent 8px 12px); transform: translateX(-50%); z-index: 2; }
  .court-wrap .attack-line-far { position: absolute; left: 33%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.6); }
  .court-wrap .attack-line-near { position: absolute; left: 67%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.6); }
  /* Side labels */
  .court-wrap .side-label {
    position: absolute; top: 8px; font-size: 0.7rem; letter-spacing: 2px; font-weight: 900;
    color: rgba(255,255,255,0.55); text-transform: uppercase; pointer-events: none; z-index: 2;
  }
  .court-wrap .side-label.home { left: 12px; }
  .court-wrap .side-label.away { right: 12px; }

  .player-circle {
    position: absolute;
    width: 9%; aspect-ratio: 1;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    display: flex; align-items: flex-end; justify-content: center;
    font-weight: 900; color: #fff;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    font-size: 0.7rem;
    transition: transform 0.4s, filter 0.3s, box-shadow 0.3s;
    z-index: 3;
    overflow: hidden;
    background-color: #334155;
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center 30%;
  }
  .player-circle.active { transform: translate(-50%, -50%) scale(1.4); filter: brightness(1.15) drop-shadow(0 0 14px #fff); z-index: 5; box-shadow: 0 0 0 3px #fbbf24, 0 4px 16px rgba(0,0,0,0.8); }
  .player-circle .num {
    position: absolute; top: -6px; right: -6px;
    background: #fff; color: #0f172a;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 900;
    border: 2px solid currentColor;
    pointer-events: none;
    z-index: 4;
  }
  .player-circle .label {
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff;
    padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; white-space: nowrap;
    margin-top: 6px; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
    z-index: 6;
  }
  .player-circle:hover .label { opacity: 1; }
  /* Fallback initials when no photo */
  .player-circle .initials {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-weight: 900; color: #fff; font-size: 1rem; letter-spacing: 1px;
  }
  .ball {
    position: absolute;
    width: 32px; height: 32px;
    background-image: url('./assets/volleyball.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.55));
    z-index: 10;
    transition: left 0.5s cubic-bezier(0.4, 0.0, 0.2, 1), top 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    pointer-events: none;
  }
  .ball.spin { animation: ballspin 0.6s linear infinite; }
  @keyframes ballspin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
  .action-burst {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 8; pointer-events: none;
    font-weight: 900; letter-spacing: 2px;
    font-size: 1.2rem;
    text-shadow: 0 0 12px rgba(0,0,0,0.9);
    animation: burst 0.8s ease-out forwards;
  }
  @keyframes burst {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -80%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -140%) scale(1); }
  }
  .action-burst.kill { color: #22c55e; }
  .action-burst.ace { color: #fbbf24; }
  .action-burst.block { color: #7c3aed; }
  .action-burst.dig { color: #38bdf8; }
  .action-burst.error { color: #ef4444; }

  .controls {
    display: flex; gap: 8px; justify-content: center; margin: 12px 0; flex-wrap: wrap;
  }
  .controls button, .controls select {
    padding: 8px 16px; font-size: 0.9rem;
  }

  .log-panel {
    max-height: 200px; overflow-y: auto;
    background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px;
    font-family: monospace; font-size: 0.8rem;
    color: #cbd5e1;
  }
  .log-entry { padding: 3px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); }
  .log-entry.point { color: #fbbf24; font-weight: 700; }
  .log-entry.setwon { color: #22c55e; font-weight: 900; }
  .log-entry.matchwon { color: #f97316; font-weight: 900; font-size: 1rem; }

  #match-picker { padding: 16px; background: rgba(15,23,42,0.7); border-radius: 12px; }
  #match-picker select { max-width: 100%; }
  #match-picker .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
  @media (max-width: 720px) {
    #match-picker .row { grid-template-columns: 1fr; }
    .sim-header { grid-template-columns: 1fr; }
    .score-big { font-size: 2.2rem; }
    .team-tag.away { flex-direction: row; text-align: left; }
    .player-circle { width: 11%; font-size: 0.6rem; }
    .player-circle .num { width: 14px; height: 14px; font-size: 0.55rem; }
  }
</style>
</head>
<body>
<div class="container">
  <nav class="topnav">
    <a href="./index.html">🏠 Home</a>
    <a href="./standings.html">📊 Standings</a>
    <a href="./player-stats.html">🌟 Player stats</a>
    <a href="./match-sim.html" class="active">🎮 Match Sim</a>
  </nav>

  <h1><span class="emoji">🎮</span> MATCH SIMULATOR</h1>
  <p class="tagline">Watch your drafted teams play it out. Best of 5 sets.</p>

  <div id="setup-card" class="card">
    <div id="match-picker">
      <label>League</label>
      <select id="league-select"></select>
      <div class="row">
        <div>
          <label>Home team (bottom)</label>
          <select id="home-team"></select>
        </div>
        <div>
          <label>Away team (top)</label>
          <select id="away-team"></select>
        </div>
      </div>
      <div class="row-btns" style="margin-top: 14px;">
        <button onclick="startMatch()">▶️ Start match</button>
      </div>
      <p id="roster-note" style="color:#94a3b8; font-size:0.8rem; margin-top:10px;">
        Loading rosters…
      </p>
    </div>
  </div>

  <div id="match-view" class="hidden">
    <div class="sim-header">
      <div class="team-tag" id="tag-home">
        <div class="swatch"></div>
        <div class="name"></div>
      </div>
      <div class="score-box">
        <div class="score-big"><span id="score-home">0</span> : <span id="score-away">0</span></div>
        <div class="set-info" id="set-info">Set 1 of 5</div>
        <div class="sets-row" id="sets-row"></div>
      </div>
      <div class="team-tag away" id="tag-away">
        <div class="swatch"></div>
        <div class="name"></div>
      </div>
    </div>

    <div class="court-wrap" id="court">
      <div class="attack-line-far"></div>
      <div class="attack-line-near"></div>
      <div class="net"></div>
      <div class="side-label home" id="side-label-home">HOME</div>
      <div class="side-label away" id="side-label-away">AWAY</div>
    </div>

    <div class="controls">
      <button onclick="togglePause()" id="btn-pause">⏸️ Pause</button>
      <select id="speed-select" onchange="setSpeed()">
        <option value="0.5">0.5× (slow-mo)</option>
        <option value="1" selected>1×</option>
        <option value="2">2× (fast)</option>
        <option value="4">4× (very fast)</option>
      </select>
      <button onclick="finishInstantly()" class="secondary">⏩ Simulate to end</button>
      <button onclick="resetSim()" class="secondary">↺ New match</button>
    </div>

    <div class="card">
      <h3 style="color:#fbbf24; font-size:0.9rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px;">📋 Play-by-play</h3>
      <div class="log-panel" id="log-panel"></div>
    </div>
  </div>
</div>

<script type="module" src="./js/back-button.js"></script>
<script type="module">
  import { db, ref, get } from "./js/firebase-init.js";
  import { listLeagues, ensureGomiCupSeeded, currentLeagueId, getLeague } from "./js/leagues.js";
  import { escapeHtml, shuffle } from "./js/util.js";
  import { createMatch, simulateRally, playerAtSpot } from "./js/match-engine.js";
  import { getAllPlayers } from "./js/players.js";
  import { photoPathFor, getInitials } from "./js/data.js";
  import { PHOTO_CONFIG } from "./js/photo-config.js";
  import { playPick, playYourTurn, playReveal } from "./js/sounds.js";

  // Transform engine coords (vertical, home on bottom) → screen coords (horizontal, home on left)
  // screen.x = 1 - engine.y   (engine's y=0.85 near home endline → screen x=0.15 = far left)
  // screen.y = engine.x       (engine's x sideline maps to screen vertical)
  function toScreen(spot) {
    if (!spot) return { x: 0.5, y: 0.5 };
    return { x: 1 - spot.y, y: spot.x };
  }

  await ensureGomiCupSeeded();

  const leagues = await listLeagues();
  const lgSel = document.getElementById('league-select');
  const initialId = new URLSearchParams(location.search).get('league') || currentLeagueId();
  lgSel.innerHTML = leagues.map(l => `<option value="${l.id}" ${l.id === initialId ? 'selected' : ''}>${escapeHtml(l.name)}</option>`).join('');
  lgSel.addEventListener('change', populateTeams);

  // Cache all players once (needed for random-fill rosters when there's no draft)
  const ALL_PLAYERS = await getAllPlayers();
  const PLAYERS_BY_ID = Object.fromEntries(ALL_PLAYERS.map(p => [p.id, p]));

  let leagueDraft = null;      // most recent completed draft for the league, or null
  let leagueCaptains = [];     // captains from the league (always available if the league exists)
  let rosterSource = 'random'; // 'draft' or 'random'

  await populateTeams();

  async function populateTeams() {
    const leagueId = lgSel.value;
    const homeSel = document.getElementById('home-team');
    const awaySel = document.getElementById('away-team');
    const noteEl = document.getElementById('roster-note');

    // Always load the league's captains first
    const league = await getLeague(leagueId);
    leagueCaptains = (league && league.captains) || [];

    // Try to find the most recent completed draft for this league
    const draftsSnap = await get(ref(db, 'drafts'));
    const drafts = draftsSnap.val() || {};
    let latest = null;
    for (const d of Object.values(drafts)) {
      if ((d.leagueId || 'gomi-cup') !== leagueId) continue;
      if (d.status !== 'complete') continue;
      if (!latest || (d.createdAt || 0) > (latest.createdAt || 0)) latest = d;
    }
    leagueDraft = latest;
    rosterSource = latest ? 'draft' : 'random';

    if (!leagueCaptains.length) {
      homeSel.innerHTML = '<option value="">No teams in this league yet</option>';
      awaySel.innerHTML = '<option value="">No teams in this league yet</option>';
      if (noteEl) noteEl.textContent = 'This league has no captains. Add teams in League Editor first.';
      return;
    }

    const opts = leagueCaptains.map((c, i) =>
      `<option value="${i}">${escapeHtml(c.team || c.name)} (${escapeHtml(c.name)})</option>`).join('');
    homeSel.innerHTML = opts;
    awaySel.innerHTML = opts;
    if (leagueCaptains.length > 1) awaySel.selectedIndex = 1;

    if (noteEl) {
      noteEl.textContent = latest
        ? 'Rosters loaded from the most recent completed draft. Best of 5 · sets 1-4 to 25, set 5 to 15.'
        : 'No completed draft yet for this league — teams will be filled with random players from the pool for simulation. Best of 5 · sets 1-4 to 25, set 5 to 15.';
    }
  }

  // Build a fake captain-as-player entry (stats from linked player if any, else average)
  function captainAsPlayer(cap) {
    if (cap.linkedPlayerId && PLAYERS_BY_ID[cap.linkedPlayerId]) {
      return { ...PLAYERS_BY_ID[cap.linkedPlayerId], jerseyNum: 'C' };
    }
    return {
      id: cap.id || ('cap-' + (cap.name || 'x').toLowerCase()),
      name: cap.name || 'Captain',
      nickname: cap.name || 'Captain',
      attack: 6.5, serve: 6.5, defense: 6.5, setting: 6.5, athletic: 6.5,
      position: (cap.role || 'OH').split(/[^A-Za-z]/)[0].toUpperCase() || 'OH',
      jerseyNum: 'C'
    };
  }

  // Get roster (drafted players + captain) for a captain
  function getRoster(captainIdx, usedIds) {
    const cap = leagueCaptains[captainIdx];
    const roster = [captainAsPlayer(cap)];
    usedIds.add(roster[0].id);

    if (rosterSource === 'draft' && leagueDraft) {
      const picks = (leagueDraft.picks || []).filter(p => p.captainIdx === captainIdx);
      const playersById = Object.fromEntries((leagueDraft.players || []).map(p => [p.id, p]));
      picks.forEach((pk, i) => {
        const p = playersById[pk.playerId] || PLAYERS_BY_ID[pk.playerId];
        if (p) { roster.push({ ...p, jerseyNum: i + 1 }); usedIds.add(p.id); }
      });
    }

    // Fill up to 6 with random players not yet used, skipping other captains' linked players
    if (roster.length < 6) {
      const linkedByOtherCaps = new Set(
        leagueCaptains.filter((_, i) => i !== captainIdx).map(c => c.linkedPlayerId).filter(Boolean)
      );
      const pool = shuffle(ALL_PLAYERS.filter(p => !usedIds.has(p.id) && !linkedByOtherCaps.has(p.id)));
      let n = roster.length;
      while (roster.length < 6 && pool.length) {
        const p = pool.shift();
        roster.push({ ...p, jerseyNum: n });
        usedIds.add(p.id);
        n++;
      }
    }
    return roster.slice(0, 6);
  }

  // ============ SIM RUNTIME ============
  let match = null;
  let paused = false;
  let speed = 1;
  let rallyTimer = null;

  window.startMatch = () => {
    const homeIdx = parseInt(document.getElementById('home-team').value);
    const awayIdx = parseInt(document.getElementById('away-team').value);
    if (isNaN(homeIdx) || isNaN(awayIdx)) return alert('Pick a team for both home and away.');
    if (homeIdx === awayIdx) return alert('Pick different teams for home and away.');
    const usedIds = new Set();
    const homeRoster = getRoster(homeIdx, usedIds);
    const awayRoster = getRoster(awayIdx, usedIds);
    if (homeRoster.length < 6) return alert(`Home team only has ${homeRoster.length} players (need 6). Not enough players in the pool.`);
    if (awayRoster.length < 6) return alert(`Away team only has ${awayRoster.length} players (need 6). Not enough players in the pool.`);

    match = createMatch({
      homeTeam: homeRoster, awayTeam: awayRoster,
      homeName: leagueCaptains[homeIdx].team,
      awayName: leagueCaptains[awayIdx].team,
      homeColor: leagueCaptains[homeIdx].color,
      awayColor: leagueCaptains[awayIdx].color
    });

    document.getElementById('setup-card').classList.add('hidden');
    document.getElementById('match-view').classList.remove('hidden');
    renderHeader();
    renderCourt();
    logSeed();
    paused = false;
    scheduleNextRally();
    try { playYourTurn(); } catch (e) {}
  };

  window.resetSim = () => {
    if (rallyTimer) clearTimeout(rallyTimer);
    match = null; paused = false;
    document.getElementById('setup-card').classList.remove('hidden');
    document.getElementById('match-view').classList.add('hidden');
    document.getElementById('log-panel').innerHTML = '';
  };

  window.togglePause = () => {
    paused = !paused;
    document.getElementById('btn-pause').textContent = paused ? '▶️ Resume' : '⏸️ Pause';
    if (!paused) scheduleNextRally();
  };

  window.setSpeed = () => {
    speed = parseFloat(document.getElementById('speed-select').value) || 1;
  };

  window.finishInstantly = () => {
    if (!match) return;
    while (!match.matchOver) {
      const events = simulateRally(match);
      events.forEach(e => appendLog(formatEvent(e)));
    }
    renderHeader();
    scrollLog();
    try { playReveal(); } catch (e) {}
  };

  function renderHeader() {
    if (!match) return;
    const th = document.getElementById('tag-home');
    const ta = document.getElementById('tag-away');
    th.querySelector('.swatch').style.background = match.home.color;
    th.querySelector('.name').textContent = match.home.name;
    th.querySelector('.name').style.color = match.home.color;
    ta.querySelector('.swatch').style.background = match.away.color;
    ta.querySelector('.name').textContent = match.away.name;
    ta.querySelector('.name').style.color = match.away.color;
    document.getElementById('score-home').textContent = match.pointsHome;
    document.getElementById('score-away').textContent = match.pointsAway;
    document.getElementById('set-info').textContent = match.matchOver
      ? '🏆 MATCH OVER'
      : `Set ${match.setNumber} · First to ${match.setNumber === 5 ? match.finalSetTarget : match.setTarget}`;
    // sets row
    const setsRow = document.getElementById('sets-row');
    const totalSets = Math.max(match.setsHome + match.setsAway, 1);
    const pills = [];
    for (let i = 0; i < match.setsHome; i++) pills.push('<span class="set-pill won" style="background:' + match.home.color + '; color:#fff;">H</span>');
    for (let i = 0; i < match.setsAway; i++) pills.push('<span class="set-pill won" style="background:' + match.away.color + '; color:#fff;">A</span>');
    setsRow.innerHTML = `<span class="set-pill">Sets: ${match.setsHome} - ${match.setsAway}</span>`;
  }

  function renderCourt() {
    const court = document.getElementById('court');
    // Clear existing player circles + ball
    court.querySelectorAll('.player-circle, .ball, .action-burst').forEach(el => el.remove());
    // Update side labels with team names
    document.getElementById('side-label-home').textContent = match.home.name;
    document.getElementById('side-label-home').style.color = match.home.color;
    document.getElementById('side-label-away').textContent = match.away.name;
    document.getElementById('side-label-away').style.color = match.away.color;

    // Add players
    for (const side of ['home', 'away']) {
      const team = match[side];
      team.lineup.forEach((slot, i) => {
        if (!slot) return;
        // rotate offset — compute actual on-court coords (in engine's vertical space)
        const spotIndex = (6 + i - team.rotationOffset) % 6;
        const engineSpot = (side === 'home' ? [
          { x: 0.75, y: 0.85 },{ x: 0.75, y: 0.60 },{ x: 0.50, y: 0.60 },
          { x: 0.25, y: 0.60 },{ x: 0.25, y: 0.85 },{ x: 0.50, y: 0.85 }
        ] : [
          { x: 0.25, y: 0.15 },{ x: 0.25, y: 0.40 },{ x: 0.50, y: 0.40 },
          { x: 0.75, y: 0.40 },{ x: 0.75, y: 0.15 },{ x: 0.50, y: 0.15 }
        ])[spotIndex];
        // update the slot's current spot so engine sees it
        slot.spot = engineSpot;
        const screen = toScreen(engineSpot);
        const circle = document.createElement('div');
        circle.className = 'player-circle';
        circle.dataset.pid = slot.player.id;
        circle.style.left = (screen.x * 100) + '%';
        circle.style.top = (screen.y * 100) + '%';
        circle.style.borderColor = team.color;
        circle.style.color = team.color;

        // Try to load a photo; fall back to initials on error
        const pid = slot.player.id;
        const photoUrl = photoPathFor(pid);
        const cfg = PHOTO_CONFIG[pid] || { y: 25, zoom: 1.0 };
        // Preload photo to see if it exists
        const img = new Image();
        img.onload = () => {
          circle.style.backgroundImage = `url('${photoUrl}')`;
          circle.style.backgroundSize = `${cfg.zoom * 100}% auto`;
          circle.style.backgroundPosition = `center ${cfg.y}%`;
          const initEl = circle.querySelector('.initials');
          if (initEl) initEl.remove();
        };
        img.onerror = () => { /* keep initials */ };
        img.src = photoUrl;

        circle.innerHTML = `
          <span class="initials">${escapeHtml(getInitials(slot.player.name))}</span>
          <span class="num" style="color:${team.color}">${slot.player.jerseyNum || '?'}</span>
          <span class="label">${escapeHtml(slot.player.nickname || slot.player.name)}</span>
        `;
        court.appendChild(circle);
      });
    }
    // Ball starts visible at the server's spot (or center if unknown)
    const ball = document.createElement('div');
    ball.className = 'ball spin';
    // Find current server (spot 1 of the serving team) and place ball at their location
    const servingTeam = match[match.serving];
    const server = servingTeam && servingTeam.lineup ? servingTeam.lineup[(0 + servingTeam.rotationOffset) % 6] : null;
    const startSpot = server && server.spot ? toScreen(server.spot) : { x: 0.5, y: 0.5 };
    ball.style.left = (startSpot.x * 100) + '%';
    ball.style.top = (startSpot.y * 100) + '%';
    ball.style.opacity = '1';
    court.appendChild(ball);
  }

  function scheduleNextRally() {
    if (paused || !match || match.matchOver) return;
    const delay = 800 / speed;
    rallyTimer = setTimeout(async () => {
      await playRally();
      renderHeader();
      if (!match.matchOver && !paused) scheduleNextRally();
      else if (match.matchOver) {
        appendLog(`\n🏆 ${match.winner === 'home' ? match.home.name : match.away.name} WINS THE MATCH ${match.setsHome}-${match.setsAway}!`, 'matchwon');
        try { playReveal(); } catch (e) {}
      }
    }, delay);
  }

  async function playRally() {
    if (!match) return;
    const events = simulateRally(match);
    // Safety: clear any lingering highlights before the rally
    document.querySelectorAll('.player-circle.active').forEach(el => el.classList.remove('active'));
    const ball = document.querySelector('.ball');
    for (const ev of events) {
      appendLog(formatEvent(ev), classForEvent(ev));
      await animateEvent(ev, ball);
    }
    // Safety: clear highlights after rally in case something got stuck
    document.querySelectorAll('.player-circle.active').forEach(el => el.classList.remove('active'));
    // At end of rally, refresh court in case of rotation
    renderCourt();
  }

  async function animateEvent(ev, ball) {
    const stepMs = 400 / speed;
    const actorEl = (ev.actor && ev.actor.player)
      ? document.querySelector(`.player-circle[data-pid="${ev.actor.player.id}"]`)
      : null;

    // --- PHASE 1: ball travels TO the actor (they receive/touch it) ---
    if (ev.actor && ev.actor.spot && ball) {
      const s = toScreen(ev.actor.spot);
      ball.style.transitionDuration = (stepMs * 0.55 / 1000) + 's';
      ball.style.left = (s.x * 100) + '%';
      ball.style.top = (s.y * 100) + '%';
    }
    // Highlight the actor exactly when the ball reaches them
    if (actorEl) actorEl.classList.add('active');
    await sleep(stepMs * 0.55);

    // --- PHASE 2: after the touch, ball flies to its next destination (if any) ---
    if (ev.toSpot && ball) {
      const s = toScreen(ev.toSpot);
      ball.style.transitionDuration = (stepMs * 0.65 / 1000) + 's';
      ball.style.left = (s.x * 100) + '%';
      ball.style.top = (s.y * 100) + '%';
    }

    // Action bursts fire during the follow-through
    if (['kill','ace','block','dig','attack-error','serve-error'].includes(ev.type)) {
      showBurst(ev);
      try { if (ev.type === 'kill' || ev.type === 'ace') playPick(); } catch (e) {}
    }

    await sleep(stepMs * 0.45);

    // Clear this actor's glow BEFORE next event's actor lights up (fixes out-of-order glows)
    if (actorEl) actorEl.classList.remove('active');
  }

  function showBurst(ev) {
    if (!ev.actor || !ev.actor.spot) return;
    const court = document.getElementById('court');
    const burst = document.createElement('div');
    const label = {
      'kill': 'KILL!', 'ace': 'ACE!', 'block': 'BLOCK!', 'dig': 'DIG!',
      'attack-error': 'ERROR', 'serve-error': 'ERROR'
    }[ev.type] || '';
    const cls = ['kill','ace'].includes(ev.type) ? ev.type
      : ev.type === 'block' ? 'block' : ev.type === 'dig' ? 'dig' : 'error';
    burst.className = 'action-burst ' + cls;
    burst.textContent = label;
    const s = toScreen(ev.actor.spot);
    burst.style.left = (s.x * 100) + '%';
    burst.style.top = (s.y * 100) + '%';
    court.appendChild(burst);
    setTimeout(() => burst.remove(), 800);
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function classForEvent(ev) {
    if (ev.type === 'point') return 'point';
    if (ev.type === 'set-won') return 'setwon';
    if (ev.type === 'match-won') return 'matchwon';
    return '';
  }

  function formatEvent(ev) {
    const name = (a) => a && a.player ? (a.player.nickname || a.player.name) : '?';
    switch (ev.type) {
      case 'serve': return `🎾 ${name(ev.actor)} serves…`;
      case 'ace':   return `⚡ ACE! ${name(ev.actor)} — untouchable serve`;
      case 'serve-error': return `❌ ${name(ev.actor)} serves into the net`;
      case 'pass':  return `  ↳ ${name(ev.actor)} receives`;
      case 'set':   return `  ↳ ${name(ev.actor)} sets`;
      case 'attack': return `  ↳ ${name(ev.actor)} swings…`;
      case 'kill':  return `💥 KILL by ${name(ev.actor)}`;
      case 'block': return `🧱 BLOCKED by ${name(ev.actor)}`;
      case 'dig':   return `🛡 DUG by ${name(ev.actor)}`;
      case 'attack-error': return `❌ ${name(ev.actor)} attack out`;
      case 'point': return `▶ Point ${ev.team === 'home' ? match.home.name : match.away.name} (${ev.home}-${ev.away})`;
      case 'rotation': return `  ↺ ${ev.team === 'home' ? match.home.name : match.away.name} rotates`;
      case 'set-won':  return `🏁 Set ${ev.setNumber} to ${ev.team === 'home' ? match.home.name : match.away.name} (sets: ${ev.setsHome}-${ev.setsAway})`;
      case 'match-won': return `🏆 MATCH WON by ${ev.team === 'home' ? match.home.name : match.away.name}`;
      default: return ev.type;
    }
  }

  function appendLog(text, cls) {
    const panel = document.getElementById('log-panel');
    const div = document.createElement('div');
    div.className = 'log-entry' + (cls ? ' ' + cls : '');
    div.textContent = text;
    panel.appendChild(div);
    scrollLog();
  }
  function scrollLog() {
    const panel = document.getElementById('log-panel');
    panel.scrollTop = panel.scrollHeight;
  }
  function logSeed() {
    appendLog(`Match starting: ${match.home.name} vs ${match.away.name}`);
    appendLog(`Best of 5 sets — first to 3 wins the match`);
    appendLog('');
  }
</script>
</body>
</html>
