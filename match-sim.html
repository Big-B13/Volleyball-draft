  function renderCourt() {
    const court = document.getElementById('court');
    // Clear existing player circles + ball
    court.querySelectorAll('.player-circle, .ball, .ball-shadow, .action-burst, .impact-ring').forEach(el => el.remove());
    // Reset position maps for the new lineup
    for (const k of Object.keys(HOME_POS)) delete HOME_POS[k];
    for (const k of Object.keys(CURRENT_POS)) delete CURRENT_POS[k];
    for (const k of Object.keys(WALK_TIMES)) delete WALK_TIMES[k];
    // Update side labels with team names
    document.getElementById('side-label-home').textContent = match.home.name;
    document.getElementById('side-label-home').style.color = match.home.color;
    document.getElementById('side-label-away').textContent = match.away.name;
    document.getElementById('side-label-away').style.color = match.away.color;

    // Add players
    for (const side of ['home', 'away']) {
      const team = match[side];
      team.lineup.forEach((slot, i) => {
        if (!slot) return;
        // rotate offset — compute actual on-court coords (in engine's vertical space)
        const spotIndex = (6 + i - team.rotationOffset) % 6;
        const engineSpot = (side === 'home' ? [
          { x: 0.75, y: 0.85 },{ x: 0.75, y: 0.60 },{ x: 0.50, y: 0.60 },
          { x: 0.25, y: 0.60 },{ x: 0.25, y: 0.85 },{ x: 0.50, y: 0.85 }
        ] : [
          { x: 0.25, y: 0.15 },{ x: 0.25, y: 0.40 },{ x: 0.50, y: 0.40 },
          { x: 0.75, y: 0.40 },{ x: 0.75, y: 0.15 },{ x: 0.50, y: 0.15 }
        ])[spotIndex];
        // update the slot's current spot so engine sees it
        slot.spot = engineSpot;
        const screen = toScreen(engineSpot);
        const circle = document.createElement('div');
        circle.className = 'player-circle';
        circle.dataset.pid = slot.player.id;
        circle.dataset.side = side;   // 'home' or 'away' — used for movement logic
        circle.dataset.role = slot.player.position || '';   // 'S' / 'OH' / 'MB' / 'L' etc.
        circle.dataset.playerName = slot.player.name || slot.player.id;   // for zone debug labels
        circle.style.left = (screen.x * 100) + '%';
        circle.style.top = (screen.y * 100) + '%';
        circle.style.borderColor = team.color;
        circle.style.color = team.color;
        // Remember this player's home position (for restoring between touches / rallies)
        HOME_POS[slot.player.id]    = { x: screen.x, y: screen.y, side, spotIndex, engineSpot };
        CURRENT_POS[slot.player.id] = { x: screen.x, y: screen.y };

        // ---- Stats affect visual appearance ----
        // Height (150-215cm) → circle size (6.5% to 11% of court width)
        // Overall stat (avg of 5) → glow strength on the border
        const p = slot.player;
        const heightCm = p.heightCm || 180;
        const heightNorm = Math.max(0, Math.min(1, (heightCm - 150) / 65)); // 150→0, 215→1
        const sizePct = 6.5 + heightNorm * 4.5; // 6.5% (short) to 11% (tall)
        circle.style.width = sizePct.toFixed(2) + '%';
        // Overall rating for glow
        const overall = ((+p.attack || 5) + (+p.serve || 5) + (+p.defense || 5) + (+p.setting || 5) + (+p.athletic || 5)) / 5;
        const glow = Math.max(0, (overall - 5) / 3.5); // 5→0, 8.5→1
        if (glow > 0) {
          const glowPx = Math.round(6 + glow * 12);
          circle.style.boxShadow = `0 3px 10px rgba(0,0,0,0.6), 0 0 ${glowPx}px ${team.color}`;
        }
        // Elite (overall >= 7.5) gets a small ★ badge
        const isElite = overall >= 7.5;

        // Try to load a photo; fall back to initials on error
        const pid = p.id;
        const photoUrl = photoPathFor(pid);
        const cfg = PHOTO_CONFIG[pid] || { y: 25, zoom: 1.0 };
        // Preload photo to see if it exists
        const img = new Image();
        img.onload = () => {
          circle.style.backgroundImage = `url('${photoUrl}')`;
          circle.style.backgroundSize = `${cfg.zoom * 100}% auto`;
          circle.style.backgroundPosition = `center ${cfg.y}%`;
          const initEl = circle.querySelector('.initials');
          if (initEl) initEl.remove();
        };
        img.onerror = () => { /* keep initials */ };
        img.src = photoUrl;

        // Rich hover label showing the actual stats driving the sim
        const statLine = `ATK ${(+p.attack||5).toFixed(1)} · SRV ${(+p.serve||5).toFixed(1)} · DEF ${(+p.defense||5).toFixed(1)} · SET ${(+p.setting||5).toFixed(1)} · ATH ${(+p.athletic||5).toFixed(1)}`;
        const heightLine = p.heightCm ? `${p.heightCm}cm · ${p.position || 'OH'}` : (p.position || 'OH');
        // Personality traits (0..1 sliders that shape behavior)
        const tr = traitsFor(p.id);
        const traitBar = (v) => '▓'.repeat(Math.round(v * 5)) + '░'.repeat(5 - Math.round(v * 5));
        const traitLine = `AGG ${traitBar(tr.aggression)}  SHOW ${traitBar(tr.showboat)}  HUS ${traitBar(tr.hustle)}`;
        // Top-3 chemistry teammates (from persistent Firebase blob)
        const teammatesOnField = team.lineup
          .map(s => s?.player).filter(x => x && x.id !== p.id);
        const chemsList = teammatesOnField
          .map(tm => ({ pid: tm.id, name: tm.nickname || tm.name,
                        score: chemistryScore(p.id, tm.id, currentChemistryBlob,
                                              (traitsFor(p.id).chemistry || {}),
                                              (traitsFor(tm.id).chemistry || {})) }))
          .filter(c => c.score > 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, 3);
        const chemLine = chemsList.length
          ? '💚 ' + chemsList.map(c => `${escapeHtml(c.name)} ${c.score}`).join(' · ')
          : '';

        // Jump height scales with athletic stat (5=default 20px, 8=28px, 3=14px)
        const athletic = +p.athletic || 5;
        const jumpPx = Math.round(14 + (athletic - 3) * 3); // 3→14px, 5→20px, 8→29px
        circle.style.setProperty('--jump-height', `-${jumpPx}px`);

        // Synergy badges attached by applySynergiesToRoster
        const synBadges = p._synergyBadges || [];
        const synIconsHtml = synBadges.map(b =>
          `<span class="synergy-badge ${b.tier === 'full' ? 'full' : ''}" title="${escapeHtml(b.name)}${b.tier === 'full' ? ' (FULL SQUAD)' : ''}">${b.icon}</span>`
        ).join('');
        const synLine = synBadges.length
          ? '⚡ ' + synBadges.map(b => `${b.icon} ${escapeHtml(b.name)}${b.tier === 'full' ? ' 🌟' : ''}`).join(' · ')
          : '';

        circle.innerHTML = `
          <span class="initials">${escapeHtml(getInitials(p.name))}</span>
          <span class="num" style="color:${team.color}">${p.jerseyNum || '?'}</span>
          ${isElite ? `<span class="elite-badge" title="Overall ${overall.toFixed(1)}">★</span>` : ''}
          ${synIconsHtml ? `<span class="synergy-badges">${synIconsHtml}</span>` : ''}
          <div class="label">
            <div class="label-name">${escapeHtml(p.nickname || p.name)}</div>
            <div class="label-sub">${escapeHtml(heightLine)}</div>
            <div class="label-stats">${statLine}</div>
            <div class="label-stats" style="color:#c084fc;">${traitLine}</div>
            ${chemLine ? `<div class="label-stats" style="color:#4ade80;">${chemLine}</div>` : ''}
            ${synLine ? `<div class="label-stats" style="color:#fbbf24; font-weight:900;">${synLine}</div>` : ''}
          </div>
        `;
        court.appendChild(circle);
      });
    }
    // Assign each player to their invisible zone (based on role + current rotation shift).
    // Zones prevent overlap and keep positional roles cleaner.
    assignZones('home');
    assignZones('away');
    // Snap each circle to its assigned zone's center (so rotations "stick" visually).
    for (const [pid, zRect] of Object.entries(PLAYER_ZONE)) {
      const el = document.querySelector(`.player-circle[data-pid="${pid}"]`);
      if (!el) continue;
      const cx = (zRect.xMin + zRect.xMax) / 2;
      const cy = (zRect.yMin + zRect.yMax) / 2;
      el.style.transitionDuration = '0s';   // instant snap (no animation on rebuild)
      el.style.left = (cx * 100) + '%';
      el.style.top  = (cy * 100) + '%';
      CURRENT_POS[pid] = { x: cx, y: cy };
      // Restore transition on next frame so future moves animate normally
      requestAnimationFrame(() => { el.style.transitionDuration = ''; });
    }
    // Visualize zones — toggled by the checkbox. Uses role-specific colors so
    // overlapping zones are visible (Libero HUGE, Middle WIDE, Opposite SMALL, etc.)
    court.querySelectorAll('.zone-debug').forEach(el => el.remove());
    const ROLE_COLORS = {
      setter:   'rgba(168, 85, 247, 0.75)',   // purple
      opp:      'rgba(59, 130, 246, 0.75)',   // blue
      middle:   'rgba(34, 197, 94, 0.75)',    // green (WIDE)
      outside:  'rgba(251, 191, 36, 0.75)',   // gold
      leftBack: 'rgba(74, 222, 128, 0.75)',   // light green
      libero:   'rgba(240, 171, 252, 0.85)'   // pink (HUGE)
    };
    for (const [pid, z] of Object.entries(PLAYER_ZONE)) {
      const zoneName = PLAYER_ZONE_NAME[pid] || '';
      const player = document.querySelector(`.player-circle[data-pid="${pid}"]`);
      const playerName = player ? (player.dataset.playerName || pid) : pid;
      const el = document.createElement('div');
      el.className = 'zone-debug';
      el.style.left = (z.xMin * 100) + '%';
      el.style.top  = (z.yMin * 100) + '%';
      el.style.width  = ((z.xMax - z.xMin) * 100) + '%';
      el.style.height = ((z.yMax - z.yMin) * 100) + '%';
      const color = ROLE_COLORS[zoneName] || 'rgba(251,191,36,0.7)';
      el.style.borderColor = color;
      el.style.background = color.replace(/[\d.]+\)/, '0.08)');   // faint fill
      const label = ZONE_LABEL[zoneName] || zoneName.toUpperCase();
      const prio = z.priority || '';
      el.innerHTML = `<span class="zone-label" style="color:${color}">${label} · P${prio} · ${escapeHtml(playerName)}</span>`;
      court.appendChild(el);
    }
    // Ball starts visible AT the server's serve position (behind the endline, outside court).
    const ball = document.createElement('div');
    ball.className = 'ball spin h-low';
    const shadow = document.createElement('div');
    shadow.className = 'ball-shadow h-low';
    // Find who's actually serving — MUST match the engine's logic exactly.
    // Engine uses playerAtSpot(team, 0) = lineup[(0 + rotationOffset) % 6].
    const servingTeam = match[match.serving];
    let serverSlot = null;
    if (servingTeam && servingTeam.lineup) {
      // Match engine's server pick exactly: spot 1 (P1), but skip MB/L/DS (they never serve).
      const isLegalServer = (slot) => {
        if (!slot || !slot.player) return false;
        const pos = (slot.player.position || '').split('/');
        return !pos.includes('MB') && !pos.includes('L') && !pos.includes('DS');
      };
      for (let offset = 0; offset < 6; offset++) {
        const idx = (offset + servingTeam.rotationOffset) % 6;
        const cand = servingTeam.lineup[idx];
        if (isLegalServer(cand)) { serverSlot = cand; break; }
      }
      if (!serverSlot) {
        const idx = (0 + servingTeam.rotationOffset) % 6;
        serverSlot = servingTeam.lineup[idx];
      }
    }
    // Move the server OUTSIDE the court immediately — INSTANT snap, no walk animation.
    // (Between rallies is a natural break, so teleport is fine and prevents the "ball at
    //  outside spot but player still walking" bug.)
    let serveOriginX = 0.5, serveOriginY = 0.5;
    if (serverSlot && serverSlot.player) {
      const isHome = match.serving === 'home';
      // Use the server's ROLE-ZONE center for y (they always live in their zone visually).
      // Fall back to HOME_POS if zone isn't ready yet.
      const zRect = PLAYER_ZONE[serverSlot.player.id];
      const serverHome = HOME_POS[serverSlot.player.id];
      serveOriginX = isHome ? -0.05 : 1.05;
      serveOriginY = zRect
        ? (zRect.yMin + zRect.yMax) / 2
        : (serverHome ? serverHome.y : 0.5);
      // Snap server INSTANTLY to that spot (bypass zone clamp + transition)
      const serverEl = document.querySelector(`.player-circle[data-pid="${serverSlot.player.id}"]`);
      if (serverEl) {
        // Kill the walk animation for this snap
        serverEl.style.transitionDuration = '0s';
        serverEl.style.left = (serveOriginX * 100) + '%';
        serverEl.style.top  = (serveOriginY * 100) + '%';
        CURRENT_POS[serverSlot.player.id] = { x: serveOriginX, y: serveOriginY };
        WALK_TIMES[serverSlot.player.id] = 0;
        // Restore transition on next frame so future moves animate normally
        requestAnimationFrame(() => {
          serverEl.style.transitionDuration = '';
        });
      }
    }
    // Ball starts in the server's hand (same position, behind the endline)
    ball.style.left = (serveOriginX * 100) + '%';
    ball.style.top = (serveOriginY * 100) + '%';
    ball.style.opacity = '1';
    shadow.style.left = (serveOriginX * 100) + '%';
    shadow.style.top = (serveOriginY * 100) + '%';
    court.appendChild(shadow);
    court.appendChild(ball);
    // Reset ball position tracker so distance-based transitions start fresh
    BALL_LAST_POS = { x: serveOriginX, y: serveOriginY };
  }

  function scheduleNextRally() {
    if (paused || !match || match.matchOver) return;
    const delay = 400 / speed; // between-rally pause (playRally already adds its own)
    rallyTimer = setTimeout(async () => {
      // V3-lite: in manual mode, pause and let user pick which hitter to spike
      if (playMode === 'manual') await promptShotCall();
      await playRally();
      renderHeader();
      if (!match.matchOver && !paused) scheduleNextRally();
      else if (match.matchOver) {
        appendLog(`\n🏆 ${match.winner === 'home' ? match.home.name : match.away.name} WINS THE MATCH ${match.setsHome}-${match.setsAway}!`, 'matchwon');
        try { playReveal(); } catch (e) {}
      }
    }, delay);
  }

  /** V3-lite: shot-call prompt for 2D sim. */
  function promptShotCall() {
    return new Promise((resolve) => {
      const panel = document.getElementById('shot-call-panel');
      const btnRow = document.getElementById('shot-call-buttons');
      const team = match[controlSide];
      if (!team || !team.lineup) { resolve(); return; }
      const setterId = team.lineup.find(s => s && s.player && (s.player.position || '').split('/').includes('S'))?.player?.id;
      const candidates = [];
      for (let i = 0; i < 6; i++) {
        const slot = team.lineup[i];
        if (!slot || !slot.player) continue;
        if (slot.player.id === setterId) continue;
        const rotIdx = (6 + i - team.rotationOffset) % 6;
        const isFront = rotIdx >= 1 && rotIdx <= 3;
        candidates.push({ slot, player: slot.player, isFront });
      }
      const setterSlot = team.lineup.find(s => s && s.player && s.player.id === setterId);
      const setterTraits = setterSlot ? traitsFor(setterSlot.player.id) : null;
      btnRow.innerHTML = candidates.map(c => {
        const chem = setterTraits?.chemistry?.[c.player.id] || 0;
        const chemLabel = chem >= 0.9 ? '❤️ BFF' : chem >= 0.7 ? '💚 Close' : chem >= 0.5 ? '💛 Friend' : '';
        const rowTag = c.isFront ? 'FRONT ROW' : 'BACK ROW';
        return `
          <button class="shot-btn ${c.isFront ? 'frontrow' : 'backrow'}" data-pid="${c.player.id}">
            <span class="name">${c.player.name}</span>
            <span class="pos">${c.player.position || '?'}</span>
            <span class="stat">ATK ${c.player.attack || 5}</span>
            <span class="row-tag">${rowTag}</span>
            ${chemLabel ? `<span class="chem">${chemLabel}</span>` : ''}
          </button>`;
      }).join('');
      const cleanup = (pid) => {
        panel.classList.add('hidden');
        if (pid) setManualHitter(controlSide, pid);
        else setManualHitter(null);
        resolve();
      };
      panel.classList.remove('hidden');
      btnRow.querySelectorAll('.shot-btn').forEach(btn => {
        btn.onclick = () => cleanup(btn.dataset.pid);
      });
      document.getElementById('auto-shot-btn').onclick = () => cleanup(null);
    });
  }

  async function playRally() {
    if (!match) return;
    const events = augmentEvents(simulateRally(match), match);
    // Update morale bars now (before animation) so player sees fill first
    updateMoraleBars();
    // Stop idle sway during the rally so nothing fights the smooth walk/jump motion
    stopIdleMotion();
    // Reset the tiny --sx/--sy nudges from any previous idle tick
    document.querySelectorAll('.player-circle').forEach(el => {
      el.style.setProperty('--sx', '0px');
      el.style.setProperty('--sy', '0px');
    });
    // Safety: clear any lingering transient states before the rally
    ['active','jumping','diving','crouching','walking'].forEach(cls => {
      document.querySelectorAll('.player-circle.' + cls).forEach(el => el.classList.remove(cls));
    });
    const ball = document.querySelector('.ball');
    const shadow = document.querySelector('.ball-shadow');
    for (let i = 0; i < events.length; i++) {
      const ev = events[i];
      const prev = events[i - 1] || null;
      const next = events[i + 1] || null;
      // Record set final scores as they happen so the header can display 25-23, 22-25, etc.
      if (ev.type === 'set-won' && ev.finalHome != null && ev.finalAway != null) {
        setScores.push({
          setNum: ev.setNumber, home: ev.finalHome, away: ev.finalAway, winner: ev.team
        });
      }
      // On a point event: update fire/cold visual states based on team momentum + player streaks
      if (ev.type === 'point') {
        updateMomentumVisuals(ev);
      }
      appendLog(formatEvent(ev), classForEvent(ev));
      await animateEvent(ev, prev, next, ball, shadow);
    }
    // Small pause between rallies (feels like an actual match reset)
    await sleep(600 / speed);
    // Safety: clear all transient states after rally in case something got stuck
    ['active','jumping','diving','crouching','walking'].forEach(cls => {
      document.querySelectorAll('.player-circle.' + cls).forEach(el => el.classList.remove(cls));
    });
    // Did a rotation happen this rally? Just flash the badge — NO player animation.
    // (The engine already tracks rotation via rotationOffset for gameplay logic.
    //  Players stay locked to their role zone visually — no confusing shuffle that
    //  puts Big-B in the opposite zone or anything like that.)
    const rotationEvents = events.filter(e => e.type === 'rotation');
    for (const rotEv of rotationEvents) {
      showRotationBadge(rotEv.team);
    }
    // At end of rally, refresh court (re-syncs engine spots + zone snap)
    renderCourt();
    // Restart idle motion for between-rally moments (subtle)
    startIdleMotion();
  }

  function showRotationBadge(side) {
    const court = document.getElementById('court');
    // Remove any old badges first
    court.querySelectorAll('.rotation-badge').forEach(el => el.remove());
    const badge = document.createElement('div');
    badge.className = 'rotation-badge';
    badge.textContent = '↻ ROTATION';
    badge.style.left = side === 'home' ? '15%' : '85%';
    court.appendChild(badge);
    setTimeout(() => badge.remove(), 1400 / speed);
  }

  // Height profile per event type: what height is the ball AT the moment of this touch,
  // and what height does it fly through on the way to the next touch?
  // low = at hip/floor level, mid = normal contact, high = apex of arc
  const HEIGHT_AT_CONTACT = {
    'serve':        'mid',   // toss + contact around head height
    'pass':         'low',   // forearm pass down low
    'set':          'high',  // hands overhead
    'attack':       'high',  // jumping spike at peak
    'kill':         'floor', // ball is on the floor now
    'ace':          'floor',
    'block':        'high',  // hands above net
    'attack-net':   'high',
    'attack-out':   'floor',
    'attack-error': 'floor',
    'pass-error':   'floor',   // missed pass — ball drops
    'serve-error':  'floor',
    'dig':          'low',   // often diving/kneeling
    'setter-dump':  'high',  // setter reaches up and pushes it over
    'tip':          'high'   // hitter jumps but softly places
  };
  const HEIGHT_MIDFLIGHT_AFTER = {
    'serve':       'high',
    'pass':        'high',
    'set':         'high',
    'attack':      'high',
    'dig':         'high',
    'block':       'low',
    'setter-dump': 'mid',   // dumps float over the net
    'tip':         'mid'    // tips float gently
  };

  function setBallHeight(ball, shadow, level) {
    if (!ball) return;
    ['h-high','h-mid','h-low','h-floor'].forEach(c => {
      ball.classList.remove(c);
      if (shadow) shadow.classList.remove(c);
    });
    const cls = 'h-' + level;
    ball.classList.add(cls);
    if (shadow) shadow.classList.add(cls);
  }
  // Track ball's last position so we can measure distance and time proportionally
  let BALL_LAST_POS = { x: 0.5, y: 0.5 };
  /** Set ball position with a transition time proportional to distance.
   *  transMs is used as a MINIMUM floor. Actual time = max(transMs, distance * speedFactor).
   *  This makes short flights snappy and long flights (like a serve) take proper time. */
  function setBallPos(ball, shadow, s, transMs) {
    // Compute distance from last position (0..1 court units → sqrt2 max)
    const dx = s.x - BALL_LAST_POS.x;
    const dy = s.y - BALL_LAST_POS.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    // Ball speed: full court diagonal (~1.4) at 1× speed should take ~1.2s → 1.2/1.4 = 0.86s per unit
    // At higher sim speed we scale it down proportionally.
    const speedFactor = 850 / speed;   // ms per court unit
    const durMs = Math.max(transMs, d * speedFactor);
    BALL_LAST_POS = { x: s.x, y: s.y };
    if (ball) {
      ball.style.transitionDuration = (durMs / 1000) + 's';
      ball.style.left = (s.x * 100) + '%';
      ball.style.top = (s.y * 100) + '%';
    }
    if (shadow) {
      shadow.style.transitionDuration = (durMs / 1000) + 's';
      shadow.style.left = (s.x * 100) + '%';
      shadow.style.top = (s.y * 100) + '%';
    }
    return durMs;
  }

  /** Serve ceremony: server bounces the ball, tosses it up, catches contact, then serves.
   *  Takes ~4s at 1× speed, scales with sim speed. Ball starts in server's hand → tosses
   *  high above them → peaks → drops back → contact. */
  async function performServeCeremony(ev, ball, shadow, actorEl) {
    if (!ev.actor || !ev.actor.player || !ball) return;
    const pid = ev.actor.player.id;
    // Use the server's ACTUAL current position (set by renderCourt as an instant snap).
    // This guarantees the ball is exactly where the server is standing.
    const servePos = CURRENT_POS[pid] || predictContactPos(ev, null);
    if (!servePos) return;

    // Place ball on the server (start of ceremony)
    setBallPos(ball, shadow, { x: servePos.x, y: servePos.y }, 200 / speed);
    setBallHeight(ball, shadow, 'low');
    await sleep(220 / speed);

    // Bounce dribble x2 (down, up, down, up) — quick bounces
    for (let i = 0; i < 2; i++) {
      setBallHeight(ball, shadow, 'floor');
      await sleep(180 / speed);
      setBallHeight(ball, shadow, 'low');
      await sleep(180 / speed);
    }

    // Big toss — ball goes HIGH and stays there briefly
    setBallHeight(ball, shadow, 'high');
    // Bump ball's y up slightly to feel like it's rising above head (nudge -3% y = upward on screen)
    const tossY = Math.max(0.03, servePos.y - 0.06);
    setBallPos(ball, shadow, { x: servePos.x, y: tossY }, 700 / speed);
    await sleep(900 / speed);

    // Peak — hover for a beat (server winds up)
    await sleep(350 / speed);

    // Ball drops back to contact height at server's spot
    setBallPos(ball, shadow, { x: servePos.x, y: servePos.y }, 500 / speed);
    setBallHeight(ball, shadow, 'mid');
    // Server does a small crouch → jump animation right at contact
    if (actorEl) {
      actorEl.classList.add('crouching');
      await sleep(200 / speed);
      actorEl.classList.remove('crouching');
      actorEl.classList.add('jumping');
      await sleep(300 / speed);
      actorEl.classList.remove('jumping');
    } else {
      await sleep(500 / speed);
    }
    // Total ceremony time: bounce(720) + toss(900) + hover(350) + drop(500) + swing(500) ≈ 3-4s at 1×
  }

  // Stance for the actor of this event type ("go DOWN for a save, UP for a spike…")
  //   jumping   = leap upward (attack/kill/ace/block/set)
  //   crouching = slight bend (pass/receive)
  //   diving    = sprawled dive (dig — the acrobatic save)
  const STANCE_FOR_EVENT = {
    'attack':  'jumping',
    'kill':    'jumping',
    'ace':     'jumping',   // slight jump serve
    'set':     'jumping',   // reaching up
    'block':   'jumping',
    'pass':    'crouching',
    'dig':     'diving',
    'serve':   'crouching',
    'attack-net':   'jumping',
    'attack-out':   'jumping',
    'attack-error': 'jumping',
    'pass-error':   'diving',    // whiffed on the pass
    'serve-error':  'crouching',
    'setter-dump':  'jumping',  // reaches up to push over
    'tip':          'jumping'   // hitter still jumps, just doesn't swing hard
  };

  /** Predict where the actor will physically be at the moment of their contact.
   *  PURE — doesn't mutate anything. Used by Phase 3 to aim the ball at the correct meetup
   *  point before the next event fires, so the ball and the next player converge there. */
  /** Predict where this event's actor makes contact.
   *  ALWAYS returns a position inside the actor's assigned zone — no exceptions.
   *  Ball flies to this exact spot so player and ball meet. */
  function predictContactPos(ev, prevEv) {
    if (!ev || !ev.actor || !ev.actor.player) return null;
    const actorPid = ev.actor.player.id;
    const actorHome = HOME_POS[actorPid];
    if (!actorHome) return null;
    const side = actorHome.side;
    const isHome = side === 'home';
    const isFront = isFrontZone(actorPid);
    const center = zoneCenter(actorPid);
    let target = center;

    switch (ev.type) {
      case 'serve':
      case 'ace':
        // Server stands BEHIND the endline (outside the court entirely, opposite side of net).
        // For HOME: net is at x=0.5, so far endline is at x=0 → serve from x=-0.05 (outside).
        // Uses force=true to bypass zone clamp. Court overflow is set to visible.
        target = { x: side === 'home' ? -0.05 : 1.05, y: center.y };
        break;
      case 'pass':
      case 'pass-error': {
        // Passer moves within their zone toward the ball's incoming y
        let ty = center.y;
        if (prevEv && prevEv.actor && prevEv.actor.spot) {
          const from = toScreen(prevEv.actor.spot);
          ty = center.y + (from.y - center.y) * 0.4;
        }
        target = { x: center.x, y: ty };
        break;
      }
      case 'set':
      case 'setter-dump':
        // Setter contacts at the front of their zone (net edge)
        target = netEdgeOfZone(actorPid, side);
        break;
      case 'attack':
      case 'kill':
      case 'attack-error':
      case 'attack-net':
      case 'attack-out':
      case 'tip': {
        // Attacker approaches to the net edge of their zone.
        // Back-row attack: takeoff at center of zone (behind 3m line).
        if (ev.tactic === 'back-row' || !isFront) {
          target = center;   // back-row attacker takes off from zone middle
        } else {
          target = netEdgeOfZone(actorPid, side);
        }
        break;
      }
      case 'block':
        // Blocker at the net edge of their zone
        target = netEdgeOfZone(actorPid, side);
        break;
      case 'dig': {
        // Digger moves within their zone toward the ball's incoming trajectory
        let tx = center.x, ty = center.y;
        if (prevEv && prevEv.actor && prevEv.actor.spot) {
          const from = toScreen(prevEv.actor.spot);
          tx = center.x + (from.x - center.x) * 0.3;
          ty = center.y + (from.y - center.y) * 0.3;
        }
        target = { x: tx, y: ty };
        break;
      }
      default:
        return null;
    }
    // Final zone clamp — guarantees the position is reachable
    return clampToZone(actorPid, target.x, target.y);
  }

  /** Get all players on a given side (returns array of {pid, home, role}). */
  function playersOnSide(side) {
    const out = [];
    for (const [pid, info] of Object.entries(HOME_POS)) {
      if (info.side === side) {
        const el = document.querySelector(`.player-circle[data-pid="${pid}"]`);
        out.push({ pid, home: info, role: el ? el.dataset.role : '' });
      }
    }
    return out;
  }

  /** Move the actor + supporting cast into position for a given event.
   *  Returns the actor's contact position (same as predictContactPos). */
  // ═══════════════════════════════════════════════════════════════════════
  // VOLLEYBALL MOVEMENT SYSTEM  (based on real volleyball mechanics + Big-B's design doc)
  // ═══════════════════════════════════════════════════════════════════════
  //
  // ROLES (auto-classified per player):
  //   setter   - runs offense, always heads to net-front-middle "target zone"
  //   oh1/oh2  - outside hitters, attack from left pin (both sides)
  //   opp      - opposite hitter, attacks from right pin
  //   mb1/mb2  - middle blockers, attack quick middle & lead the block
  //   libero   - defensive specialist, back-row anchor, best passer
  //
  // FORMATIONS (whole-team movement patterns triggered by phase, not by event):
  //   serve_prep      - our team about to serve. Server behind endline, rest in base.
  //   serve_receive   - opponent served. Passers form arc, setter releases to target.
  //   attack_ready    - we have the ball, building attack. Hitters back off for approach.
  //   defense_base    - opponent has the ball, mid-play. Ready-to-read positioning.
  //   defense_block   - opponent about to spike. 3-blocker wall + perimeter dig.
  //   transition      - just made contact, need to switch offense↔defense.
  // ═══════════════════════════════════════════════════════════════════════

  /** Classify a player's on-court role from their position string + home coords. */
  function classifyRole(pid) {
    const el = document.querySelector(`.player-circle[data-pid="${pid}"]`);
    const home = HOME_POS[pid];
    if (!el || !home) return 'other';
    const roleStr = (el.dataset.role || '').toUpperCase();
    if (roleStr.split('/').includes('S')) return 'setter';
    if (roleStr.split('/').includes('L') || roleStr.split('/').includes('DS')) return 'libero';
    if (roleStr.split('/').includes('OP')) return 'opp';
    if (roleStr.split('/').includes('MB')) return home.y < 0.5 ? 'mb1' : 'mb2';
    if (roleStr.split('/').includes('OH')) return home.y < 0.5 ? 'oh1' : 'oh2';
    // Fallback by home position
    if (home.y < 0.35) return 'oh1';
    if (home.y > 0.65) return 'oh2';
    return 'mb1';
  }

  // ═══════════════════════════════════════════════════════════════════════
  // ROLE-BASED ZONES — from Big-B's design doc.
  // Each role has DIFFERENT size + shape. Zones INTENTIONALLY OVERLAP.
  // Priority number decides who takes a ball in an overlapping area.
  //
  // Home center (0..1 court coords) + width/height (0..1 court units).
  // Zone rectangle = center ± width/2, center ± height/2.
  //
  //   Role       | Home (x,y)  | Width | Height | Type   | Priority | Row
  //   -----------|-------------|-------|--------|--------|----------|-----
  //   Setter     | (0.20,0.75) | 0.20  | 0.30   | Medium | 2        | back
  //   Opposite   | (0.375,0.20)| 0.15  | 0.24   | Small  | 3        | front
  //   Middle     | (0.35,0.50) | 0.28  | 0.18   | WIDE   | 5        | front
  //   Outside    | (0.35,0.80) | 0.18  | 0.30   | Medium | 3        | front
  //   Left Back  | (0.10,0.20) | 0.22  | 0.36   | Large  | 4        | back
  //   Libero     | (0.15,0.50) | 0.28  | 0.40   | HUGE   | 1        | back
  // ═══════════════════════════════════════════════════════════════════════

  /** Role definitions (home-side coordinates). Priority: 1=highest (libero first). */
  const ROLE_ZONES_HOME = {
    setter:     { home: { x: 0.22, y: 0.80 }, width: 0.24, height: 0.36, priority: 2, row: 'back',
                  attackPos: { x: 0.46, y: 0.55 } },   // runs here on set
    opp:        { home: { x: 0.38, y: 0.20 }, width: 0.18, height: 0.28, priority: 3, row: 'front',
                  attackPos: { x: 0.46, y: 0.18 } },
    middle:     { home: { x: 0.42, y: 0.50 }, width: 0.16, height: 0.60, priority: 5, row: 'front',
                  attackPos: { x: 0.46, y: 0.50 } },   // WIDE across the net (slide + quick)
    outside:    { home: { x: 0.38, y: 0.82 }, width: 0.22, height: 0.34, priority: 3, row: 'front',
                  attackPos: { x: 0.46, y: 0.82 } },
    leftBack:   { home: { x: 0.12, y: 0.20 }, width: 0.24, height: 0.40, priority: 4, row: 'back',
                  attackPos: null },
    libero:     { home: { x: 0.15, y: 0.50 }, width: 0.30, height: 0.70, priority: 1, row: 'back',
                  attackPos: null }
  };
  // Zone label for the debug overlay
  const ZONE_LABEL = {
    setter:   'Z1 SETTER',
    opp:      'Z2 OPPOSITE',
    middle:   'Z3 MIDDLE',
    outside:  'Z4 OUTSIDE',
    leftBack: 'Z5 LEFT-BACK',
    libero:   'Z6 LIBERO'
  };

  /** Convert a role's home-side definition to actual rectangle bounds.
   *  Mirrors across net for away side. */
  function roleZoneRect(roleKey, side) {
    const rz = ROLE_ZONES_HOME[roleKey];
    if (!rz) return null;
    const cx = side === 'home' ? rz.home.x : (1 - rz.home.x);
    const cy = rz.home.y;
    const halfW = rz.width / 2;
    const halfH = rz.height / 2;
    return {
      xMin: Math.max(0.01, cx - halfW),
      xMax: Math.min(0.99, cx + halfW),
      yMin: Math.max(0.01, cy - halfH),
      yMax: Math.min(0.99, cy + halfH),
      priority: rz.priority,
      row: rz.row,
      roleKey
    };
  }

  const PLAYER_ZONE = {};        // pid → zone bounds (with priority + row + roleKey)
  const PLAYER_ZONE_NAME = {};   // pid → 'setter' | 'opp' | 'middle' | 'outside' | 'leftBack' | 'libero'

  /** Clockwise cycle order: Z1 → Z6 → Z5 → Z4 → Z3 → Z2 → Z1
   *  Used ONLY for the rotation-dance animation (brief visual shuffle between rallies).
   *  Players ALWAYS end up back in their role zone — we don't permanently shift roles,
   *  because the engine already handles the rotation via `rotationOffset` for spot logic.
   *  Locking zones to role keeps setters at the setter zone, liberos at libero zone, etc. */
  const ZONE_CYCLE = ['setter', 'libero', 'leftBack', 'outside', 'middle', 'opp'];

  /** Each player's assigned role zone (set once, never shifts). */
  const PLAYER_ROLE_ZONE = {};

  /** Assign each player to their zone based on their volleyball role.
   *  Zones stay locked to role across the whole match — the engine tracks rotation
   *  independently via rotationOffset. Between rallies, animateClockwiseRotation
   *  plays a brief visual "shuffle" that ends back at role zones. */
  function assignZones(side) {
    const players = playersOnSide(side);
    const roleClaimed = new Set();

    const roleForClassified = {
      setter: 'setter', opp: 'opp',
      mb1: 'middle', mb2: 'middle',
      oh1: 'outside', oh2: 'outside',
      libero: 'libero'
    };

    // Pass 1: assign each player their role zone (persists across rallies).
    for (const p of players) {
      if (!PLAYER_ROLE_ZONE[p.pid]) {
        const cls = classifyRole(p.pid);
        const roleKey = roleForClassified[cls];
        if (roleKey && !roleClaimed.has(roleKey)) {
          PLAYER_ROLE_ZONE[p.pid] = roleKey;
          roleClaimed.add(roleKey);
        }
      } else {
        roleClaimed.add(PLAYER_ROLE_ZONE[p.pid]);
      }
    }
    // Pass 2: overflow players (duplicate roles) get closest free zone
    const unassigned = players.filter(p => !PLAYER_ROLE_ZONE[p.pid]);
    const allRoles = Object.keys(ROLE_ZONES_HOME);
    for (const p of unassigned) {
      const free = allRoles.filter(r => !roleClaimed.has(r));
      if (!free.length) continue;
      let best = free[0], bestD = Infinity;
      for (const roleKey of free) {
        const zRect = roleZoneRect(roleKey, side);
        const cx = (zRect.xMin + zRect.xMax) / 2;
        const cy = (zRect.yMin + zRect.yMax) / 2;
        const d = Math.hypot(p.home.x - cx, p.home.y - cy);
        if (d < bestD) { bestD = d; best = roleKey; }
      }
      PLAYER_ROLE_ZONE[p.pid] = best;
      roleClaimed.add(best);
    }

    // Pass 3: bind PLAYER_ZONE rect + name to the role (never rotated).
    for (const p of players) {
      const role = PLAYER_ROLE_ZONE[p.pid];
      if (!role) continue;
      PLAYER_ZONE[p.pid] = roleZoneRect(role, side);
      PLAYER_ZONE_NAME[p.pid] = role;
    }
  }

  /** Clamp a target to the player's zone (with 2% inset so they don't paint the boundary line). */
  function clampToZone(pid, targetX, targetY) {
    const z = PLAYER_ZONE[pid];
    if (!z) return { x: targetX, y: targetY };
    return {
      x: Math.max(z.xMin + 0.01, Math.min(z.xMax - 0.01, targetX)),
      y: Math.max(z.yMin + 0.01, Math.min(z.yMax - 0.01, targetY))
    };
  }

  /** Center of a player's zone. */
  function zoneCenter(pid) {
    const z = PLAYER_ZONE[pid];
    if (!z) return { x: 0.5, y: 0.5 };
    return { x: (z.xMin + z.xMax) / 2, y: (z.yMin + z.yMax) / 2 };
  }

  /** Is the player currently in a front-row zone (near the net)?
   *  Front-row roles: opp, middle, outside. Back-row: setter (starts back), leftBack, libero. */
  function isFrontZone(pid) {
    const name = PLAYER_ZONE_NAME[pid];
    return name === 'opp' || name === 'middle' || name === 'outside';
  }

  /** Get the priority number for a player's current role zone (1 = highest / gets ball first). */
  function playerZonePriority(pid) {
    const zone = PLAYER_ZONE[pid];
    return zone ? (zone.priority || 5) : 5;
  }

  /** Position at the net inside a player's zone. */
  function netEdgeOfZone(pid, side) {
    const z = PLAYER_ZONE[pid];
    if (!z) return { x: 0.5, y: 0.5 };
    const netX = side === 'home' ? z.xMax - 0.02 : z.xMin + 0.02;
    return { x: netX, y: (z.yMin + z.yMax) / 2 };
  }

  /** Position at the endline inside a player's zone. */
  function backEdgeOfZone(pid, side) {
    const z = PLAYER_ZONE[pid];
    if (!z) return { x: 0.5, y: 0.5 };
    const endX = side === 'home' ? z.xMin + 0.02 : z.xMax - 0.02;
    return { x: endX, y: (z.yMin + z.yMax) / 2 };
  }
  /** Zone-based formations. Each player moves within THEIR zone based on the play phase.
   *  Formations only tell each player WHERE inside their zone (net/back/center + y bias).
   *  Because everyone stays in their zone, overlap is impossible by design. */
  function moveTeamToFormation(side, phase, skipPid) {
    const players = playersOnSide(side);
    for (const p of players) {
      if (p.pid === skipPid) continue;
      const target = zonePositionForPhase(p.pid, side, phase);
      if (target) movePlayerTo(p.pid, target.x, target.y);
    }
  }

  /** Compute a player's target position INSIDE their zone for a given phase.
   *  Phases: serve_prep | serve_receive | attack_ready | defense_base | defense_block */
  function zonePositionForPhase(pid, side, phase) {
    const front = isFrontZone(pid);
    const center = zoneCenter(pid);
    const role = classifyRole(pid);
    let target = center;
    switch (phase) {
      case 'serve_prep':
        // Everyone at their zone center, back players slightly forward
        target = center;
        break;
      case 'serve_receive':
        // Passers (back row + libero) push to front of their zone to receive
        // Front-row hitters lurk at net for quick
        // Setter runs to net edge (they'll release to target)
        if (role === 'setter') target = netEdgeOfZone(pid, side);
        else if (front)        target = center;                   // front-row hitters hold zone
        else                   target = { x: center.x + (side==='home' ? +0.05 : -0.05), y: center.y };
        break;
      case 'attack_ready':
        // Setter at net edge, front-row hitters back off toward zone endline for approach
        // Back-row players hold center
        if (role === 'setter') target = netEdgeOfZone(pid, side);
        else if (front)        target = backEdgeOfZone(pid, side);   // approach start
        else                   target = center;
        break;
      case 'defense_base':
        // Reading defense — front row near net, back row centered
        if (front) target = netEdgeOfZone(pid, side);
        else       target = center;
        break;
      case 'defense_block':
        // Front row commits to net edge (block wall), back row spreads to zone perimeter
        if (front) target = netEdgeOfZone(pid, side);
        else       target = backEdgeOfZone(pid, side);
        break;
      default:
        target = center;
    }
    return clampToZone(pid, target.x, target.y);
  }

  /** Push overlapping circles apart so they never stack.
   *  Uses CURRENT_POS (which movePlayerTo updates). Runs a few iterations for stability. */
  const MIN_SEPARATION = 0.075;   // ~7.5% of court width — 2 circles' radius
  function resolveCollisions(sideFilter) {
    const players = Object.entries(CURRENT_POS).filter(([pid]) => {
      if (!sideFilter) return true;
      return HOME_POS[pid] && HOME_POS[pid].side === sideFilter;
    });
    for (let iter = 0; iter < 4; iter++) {
      let anyPush = false;
      for (let i = 0; i < players.length; i++) {
        for (let j = i + 1; j < players.length; j++) {
          const [pidA, posA] = players[i];
          const [pidB, posB] = players[j];
          const dx = posA.x - posB.x;
          const dy = posA.y - posB.y;
          const d = Math.hypot(dx, dy);
          if (d < MIN_SEPARATION && d > 0.0001) {
            anyPush = true;
            const push = (MIN_SEPARATION - d) / 2;
            const nx = dx / d, ny = dy / d;
            // Push both players apart, then clamp to each player's zone (keeps positional order)
            let newAx = posA.x + nx * push;
            let newAy = posA.y + ny * push;
            let newBx = posB.x - nx * push;
            let newBy = posB.y - ny * push;
            // Zone clamp — respects side boundaries automatically
            const clampedA = clampToZone(pidA, newAx, newAy);
            const clampedB = clampToZone(pidB, newBx, newBy);
            newAx = clampedA.x; newAy = clampedA.y;
            newBx = clampedB.x; newBy = clampedB.y;
            movePlayerTo(pidA, newAx, newAy);   // already clamped, skip re-clamp
            movePlayerTo(pidB, newBx, newBy);
            // update in-loop positions
            players[i][1] = { x: newAx, y: newAy };
            players[j][1] = { x: newBx, y: newBy };
          }
        }
      }
      if (!anyPush) break;
    }
  }

  /** Choreograph movement for a given event.
   *  Whole-team formations by rally phase, actor to their contact position. */
  function choreographMovement(ev, prevEv) {
    const target = predictContactPos(ev, prevEv);
    if (!target) return null;
    const actorPid = ev.actor.player.id;
    const side = HOME_POS[actorPid].side;
    const otherSide = side === 'home' ? 'away' : 'home';

    // Actor to their contact position. Serves & aces let the server go OUTSIDE the court
    // (behind the endline) — bypass the zone clamp with force=true.
    const isServe = (ev.type === 'serve' || ev.type === 'ace');
    movePlayerTo(actorPid, target.x, target.y, isServe);

    // Phase-based team formations
    switch (ev.type) {
      case 'serve':
        // We're serving: server steps up (target). Rest of our team in serve_prep base.
        // Receiving team gets in SERVE_RECEIVE formation.
        moveTeamToFormation(side, 'serve_prep', actorPid);
        moveTeamToFormation(otherSide, 'serve_receive', null);
        break;
      case 'ace':
      case 'serve-error':
        // Serve terminated. Positions stay as-is (rally ends).
        break;
      case 'pass':
      case 'pass-error':
        // We received (or tried to). Setter runs to target, hitters back off for approach.
        moveTeamToFormation(side, 'attack_ready', actorPid);
        moveTeamToFormation(otherSide, 'defense_base', null);
        break;
      case 'set':
        // Setter has the ball. Team fully in attack_ready. Defenders commit to DEFENSE BASE.
        moveTeamToFormation(side, 'attack_ready', actorPid);
        moveTeamToFormation(otherSide, 'defense_base', null);
        break;
      case 'attack':
      case 'kill':
      case 'attack-error':
      case 'attack-net':
      case 'attack-out':
        // Attacker running to net. Team still attack_ready (they cover in case of block).
        moveTeamToFormation(side, 'attack_ready', actorPid);
        // Defenders COMMIT to block wall + perimeter dig
        moveTeamToFormation(otherSide, 'defense_block', null);
        break;
      case 'setter-dump':
        // Sneaky attack from the setter — defenders are still in defense_base (surprise!)
        moveTeamToFormation(side, 'attack_ready', actorPid);
        moveTeamToFormation(otherSide, 'defense_base', null);
        break;
      case 'tip':
        // Same visual as attack — hitter jumps, but sends it soft
        moveTeamToFormation(side, 'attack_ready', actorPid);
        moveTeamToFormation(otherSide, 'defense_block', null);
        break;
      case 'block':
        // Block happened. Wall stays, back row covers tips. Attacker team stays in cover.
        moveTeamToFormation(side, 'defense_block', actorPid);
        moveTeamToFormation(otherSide, 'attack_ready', null);
        break;
      case 'dig':
        // Dug! We're now on offense. Digger's team switches to attack_ready.
        moveTeamToFormation(side, 'attack_ready', actorPid);
        moveTeamToFormation(otherSide, 'defense_base', null);
        break;
    }
    // Final pass: resolve any remaining overlaps globally (both sides)
    resolveCollisions(null);
    return target;
  }

  /** Legacy stub — team-wide formations in choreographMovement now handle this. */
  function proactivePositioning(ev) { /* no-op */ }

  async function animateEvent(ev, prevEv, nextEv, ball, shadow) {
    // Base tempo per touch — slower feels more like real volleyball
    const stepMs = 900 / speed;
    const actorEl = (ev.actor && ev.actor.player)
      ? document.querySelector(`.player-circle[data-pid="${ev.actor.player.id}"]`)
      : null;

    const currActorId = ev.actor && ev.actor.player ? ev.actor.player.id : null;
    const prevActorId = prevEv && prevEv.actor && prevEv.actor.player ? prevEv.actor.player.id : null;
    const nextActorId = nextEv && nextEv.actor && nextEv.actor.player ? nextEv.actor.player.id : null;
    const isTerminating = ['kill','ace','block','attack-net','attack-out','attack-error','pass-error','serve-error','setter-dump','tip'].includes(ev.type);
    const skipPhase1 = currActorId && prevActorId && currActorId === prevActorId;

    // Non-visual events (point, rotation, set-won, match-won, etc.) — just a small beat
    if (!ev.actor && !ev.toSpot) {
      await sleep(stepMs * 0.3);
      return;
    }

    // SERVE CEREMONY: 4 seconds (at 1× speed) of toss + settle before the serve.
    // Only for the FIRST event of a rally (no prev event).
    if (ev.type === 'serve' && !prevEv) {
      await performServeCeremony(ev, ball, shadow, actorEl);
    }

    const contactLevel = HEIGHT_AT_CONTACT[ev.type] || 'mid';
    const stance = STANCE_FOR_EVENT[ev.type] || null;

    // Who jumps as the block wall on an incoming attack?
    // REAL VOLLEYBALL RULE: only FRONT-ROW players can block. Back-row (libero, setter when
    // rotated back, leftBack) are NEVER allowed to block. We check role zones — if the
    // player's assigned role is one of the front-row roles (opp/middle/outside), they can
    // legally form the wall.
    const wallEls = [];
    const FRONT_ROLES = new Set(['opp', 'middle', 'outside']);
    if ((ev.type === 'attack' || ev.type === 'kill') && ev.actor && ev.actor.spot && match) {
      const attackerOnHome = ev.actor.spot.y > 0.5;
      const defTeam = attackerOnHome ? match.away : match.home;
      if (defTeam && defTeam.lineup) {
        defTeam.lineup.forEach(slot => {
          if (!slot || !slot.player) return;
          const roleName = PLAYER_ZONE_NAME[slot.player.id];
          if (!FRONT_ROLES.has(roleName)) return;   // back-row can't block
          const el = document.querySelector(`.player-circle[data-pid="${slot.player.id}"]`);
          if (el && el !== actorEl && !wallEls.includes(el)) wallEls.push(el);
        });
      }
    }
    // On an explicit 'block' event, engine picked the blockers — but re-verify they're
    // front-row roles. If engine gave us a back-row player (shouldn't happen but safety),
    // silently drop them.
    if (ev.type === 'block' && Array.isArray(ev.blockers)) {
      ev.blockers.forEach(b => {
        if (!b || !b.player) return;
        const roleName = PLAYER_ZONE_NAME[b.player.id];
        if (!FRONT_ROLES.has(roleName)) return;   // back-row can't block, ignore
        const el = document.querySelector(`.player-circle[data-pid="${b.player.id}"]`);
        if (el && el !== actorEl && !wallEls.includes(el)) wallEls.push(el);
      });
    }

    // --- PHASE 1: REAL POSITION MOVEMENT ---
    // Move the actor (and supporting teammates) to realistic play positions.
    // Returns where the actor is heading, so the ball can be aimed at the same spot.
    let actorContactPos = null;
    if (!skipPhase1 && ev.actor && ev.actor.player) {
      actorContactPos = choreographMovement(ev, prevEv);
    }
    // Fallback: use CURRENT_POS if choreography returned null (no move for this event type)
    if (!actorContactPos && currActorId && CURRENT_POS[currActorId]) {
      actorContactPos = CURRENT_POS[currActorId];
    }
    if (!actorContactPos && ev.actor && ev.actor.spot) {
      actorContactPos = toScreen(ev.actor.spot);
    }
    // Also pre-position the defending block wall when this event is an attack
    proactivePositioning(ev);

    // --- PHASE 2: ball travels TO the actor's position ---
    // KEY FIX: ball flight MUST wait long enough for the actor to actually get there.
    // Otherwise you see "player 5 miles away but ball at spot" — the classic disconnect.
    if (!skipPhase1 && actorContactPos && ball) {
      // Short head-start so the player begins running before the ball leaves
      await sleep(Math.min(120, stepMs * 0.12));
      const actorWalkMs = WALK_TIMES[currActorId] || 0;
      // Ball must arrive AFTER the player is settled (30ms buffer for stance)
      const minFlight = actorWalkMs + 30;
      const flightMs = setBallPos(ball, shadow, actorContactPos, Math.max(stepMs * 0.35, minFlight));
      setBallHeight(ball, shadow, contactLevel);
      if (actorEl) actorEl.classList.add('active');
      // Trigger STANCE right BEFORE contact so timing looks clean
      const stanceDelay = Math.max(80, flightMs * 0.75);
      setTimeout(() => {
        if (actorEl && stance) actorEl.classList.add(stance);
        wallEls.forEach(el => el.classList.add('jumping'));
      }, stanceDelay);
      await sleep(flightMs);
    } else if (actorEl) {
      // Ball is already at the actor — glow + stance immediately
      setBallHeight(ball, shadow, contactLevel);
      actorEl.classList.add('active');
      if (stance) actorEl.classList.add(stance);
      wallEls.forEach(el => el.classList.add('jumping'));
    }

    // V2: Signature move cinematic BEFORE burst so it stages the moment
    if (ev.ability === 'signature' && actorEl) {
      await playSignatureCinematic(ev, actorEl, ball);
    }

    // V2: Tier flash on player circle (BAD shake / PERFECT green glow)
    if (actorEl && ev.tier) {
      if (ev.tier === 'PERFECT') {
        actorEl.classList.add('tier-perfect');
        setTimeout(() => actorEl.classList.remove('tier-perfect'), 600);
      } else if (ev.tier === 'BAD') {
        actorEl.classList.add('tier-bad');
        setTimeout(() => actorEl.classList.remove('tier-bad'), 500);
      }
    }

    // Fire the burst + sfx right at the moment of contact
    if (isTerminating) {
      showBurst(ev);
      try { if (ev.type === 'kill' || ev.type === 'ace') playPick(); } catch (e) {}
      if (ev.toSpot && ['kill','ace','attack-net','attack-out','attack-error'].includes(ev.type)) {
        setTimeout(() => showImpactRing(ev.toSpot), stepMs * 0.15);
      }
    }

    // V2: Crit damage number popup (à la Fly High "9014")
    if (ev.crit && ev.damage && ev.actor && ev.actor.spot) {
      showCritDamage(ev.damage, ev.actor.spot);
    }

    // V2: Update morale bars after each event that changed them
    if (ev.moraleAfter) {
      updateMoraleBars();
    }

    // --- PHASE 3: ball flies to the MEETUP POINT for the next event ---
    // Start the next player running to the meetup point NOW (parallel with ball flight),
    // then set the ball's flight time to WAIT for them if they can't get there in time.
    let destScreen = null;
    let nextPlayerWalkMs = 0;
    if (nextEv && nextEv.actor && nextEv.actor.player && nextActorId !== currActorId) {
      destScreen = predictContactPos(nextEv, ev);
      if (destScreen) {
        // Trigger the next event's team formation early so everyone starts moving
        choreographMovement(nextEv, ev);
        // Get the walk time the next actor will need (movePlayerTo returned this into WALK_TIMES)
        nextPlayerWalkMs = WALK_TIMES[nextActorId] || 0;
      }
    } else if (ev.toSpot) {
      destScreen = toScreen(ev.toSpot);
    }
    let phase3FlightMs = 0;
    if (destScreen && ball) {
      const midHeight = HEIGHT_MIDFLIGHT_AFTER[ev.type] || 'mid';
      setBallHeight(ball, shadow, midHeight);
      // Ball can't arrive faster than the player can get there.
      // Add a tiny buffer (30ms) so player settles into stance before contact.
      const minFlight = nextPlayerWalkMs + 30;
      phase3FlightMs = setBallPos(ball, shadow, destScreen, Math.max(stepMs * 0.35, minFlight));
    }

    // Hold stance through the follow-through, but at least until the ball has cleared this player.
    // Stance is released BEFORE the ball arrives at the next player (so this player is neutral by then).
    const followThrough = Math.max(stepMs * 0.3, phase3FlightMs * 0.3);
    await sleep(followThrough);

    // Release stance (recover to standing)
    if (actorEl && stance) actorEl.classList.remove(stance);
    wallEls.forEach(el => el.classList.remove('jumping'));

    // Small settle beat before next event
    await sleep(stepMs * 0.15);

    // Clear this actor's glow BEFORE next event's actor lights up
    if (actorEl) actorEl.classList.remove('active');
  }

  function showImpactRing(spotEngine) {
    const court = document.getElementById('court');
    const s = toScreen(spotEngine);
    const ring = document.createElement('div');
    ring.className = 'impact-ring';
    // Scale duration to speed too
    const dur = Math.max(220, 700 / speed);
    ring.style.animationDuration = dur + 'ms';
    ring.style.left = (s.x * 100) + '%';
    ring.style.top = (s.y * 100) + '%';
    court.appendChild(ring);
    setTimeout(() => ring.remove(), dur + 50);
  }

  function showBurst(ev) {
    if (!ev.actor || !ev.actor.spot) return;
    const court = document.getElementById('court');
    // Clear any old bursts still on screen (fixes ERROR lingering on 4× speed and stacking labels)
    court.querySelectorAll('.action-burst').forEach(el => el.remove());
    const burst = document.createElement('div');
    const label = {
      'kill': 'KILL!', 'ace': 'ACE!', 'block': 'BLOCK!', 'dig': 'DIG!',
      'attack-out':   'OUT!',
      'attack-net':   'NET!',
      'attack-error': 'OUT!',
      'pass-error':   'MISS!',   // missed pass
      'serve-error':  'NET!',
      'setter-dump':  'DUMP!',
      'tip':          'TIP!'
    }[ev.type] || '';
    const cls = ['kill','ace'].includes(ev.type) ? ev.type
      : ev.type === 'block' ? 'block'
      : ev.type === 'dig' ? 'dig'
      : (ev.type === 'setter-dump' || ev.type === 'tip') ? 'trick'
      : 'error';
    burst.className = 'action-burst ' + cls;
    burst.textContent = label;
    // Scale animation duration to speed so bursts don't outlast rallies at 4× (fixes ERROR bug)
    const dur = Math.max(280, 1000 / speed);
    burst.style.animationDuration = dur + 'ms';
    const s = toScreen(ev.actor.spot);
    burst.style.left = (s.x * 100) + '%';
    burst.style.top = (s.y * 100) + '%';
    court.appendChild(burst);
    setTimeout(() => burst.remove(), dur + 50);
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ═══════════════════════════════════════════════════════════════
  // V2 MECHANICS RENDER HELPERS
  // ═══════════════════════════════════════════════════════════════

  /** Update the morale bar fills based on match.morale. */
  function updateMoraleBars() {
    if (!match || !match.morale) return;
    for (const side of ['home','away']) {
      const el = document.getElementById(`morale-fill-${side}`);
      if (!el) continue;
      const pct = Math.max(0, Math.min(100, match.morale[side] || 0));
      el.style.width = pct + '%';
      el.classList.toggle('full', pct >= 100);
    }
  }

  /** Big crit damage popup à la Fly High. spotEngine in engine coords. */
  function showCritDamage(damage, spotEngine) {
    const court = document.getElementById('court');
    const s = toScreen(spotEngine);
    const el = document.createElement('div');
    el.className = 'crit-damage';
    el.textContent = damage.toLocaleString();
    el.style.left = (s.x * 100) + '%';
    el.style.top  = (s.y * 100) + '%';
    const dur = Math.max(700, 1400 / speed);
    el.style.animationDuration = dur + 'ms';
    court.appendChild(el);
    setTimeout(() => el.remove(), dur + 50);
  }

  /** The climax moment — freeze the court, spotlight the player, banner + streaks + flame ball.
   *  Awaits so the ball animation pauses during the drama. */
  async function playSignatureCinematic(ev, actorEl, ball) {
    const court = document.getElementById('court');
    // Freeze other players by making the court dim + spotlight the actor
    court.classList.add('signature-active');
    actorEl.classList.add('signature-star');

    // Diagonal streaks overlay
    const streak = document.createElement('div');
    streak.className = 'signature-streak';
    court.appendChild(streak);

    // Signature name banner
    const banner = document.createElement('div');
    banner.className = 'signature-banner';
    banner.textContent = ev.signature.name;
    court.appendChild(banner);

    // Flame trail on ball
    if (ball) ball.classList.add('signature-flame');

    // Sound
    try { playPick(); } catch (e) {}

    // Duration scaled to sim speed (min 900ms so the drama registers even at 4×)
    const dur = Math.max(900, 1800 / speed);
    await sleep(dur);

    // Cleanup
    court.classList.remove('signature-active');
    actorEl.classList.remove('signature-star');
    if (ball) ball.classList.remove('signature-flame');
    streak.remove();
    banner.remove();
  }

  function classForEvent(ev) {
    if (ev.type === 'point') return 'point';
    if (ev.type === 'set-won') return 'setwon';
    if (ev.type === 'match-won') return 'matchwon';
    return '';
  }

  function formatEvent(ev) {
    // Use real player names (not nicknames) — easier to follow the play-by-play
    const name = (a) => a && a.player ? (a.player.name || a.player.nickname || '?') : '?';
    // V2: prefix touch tier + crit + signature so the play-by-play tells the full story
    let prefix = '';
    if (ev.ability === 'signature' && ev.signature) prefix += `🌟 ${ev.signature.name}! `;
    else if (ev.crit)                                prefix += '💫 CRIT! ';
    if (ev.tier === 'PERFECT')                       prefix += '✨ ';
    else if (ev.tier === 'BAD' && !['serve-error','pass-error','attack-net','attack-out','attack-error'].includes(ev.type)) prefix += '⚠️ ';
    if (ev.manualCall)                               prefix += '🎯 ';
    let suffix = '';
    if (ev.damage && ev.crit)                        suffix = ` [${ev.damage.toLocaleString()}]`;
    const wrap = (s) => prefix + s + suffix;
    switch (ev.type) {
      case 'serve': return wrap(`🎾 ${name(ev.actor)} serves…`);
      case 'ace':   return wrap(`⚡ ACE! ${name(ev.actor)} — untouchable serve`);
      case 'serve-error': return wrap(`❌ ${name(ev.actor)} serves into the net (NET!)`);
      case 'pass':  return wrap(`  ↳ ${name(ev.actor)} receives`);
      case 'set': {
        const tag = ev.tactic === 'quick' ? ' (quick)'
                  : ev.tactic === 'slide' ? ' (slide)'
                  : ev.tactic === 'back-row' ? ' (back-row)'
                  : ev.tactic === 'fake' ? ' 🎭 (fake to ' + name({player: ev.decoy?.player}) + ')'
                  : '';
        return wrap(`  ↳ ${name(ev.actor)} sets${tag}`);
      }
      case 'attack': return wrap(`  ↳ ${name(ev.actor)} swings…`);
      case 'kill':  return wrap(`💥 KILL by ${name(ev.actor)}`);
      case 'setter-dump': return wrap(`🎭 SETTER DUMP by ${name(ev.actor)}!`);
      case 'tip':   return wrap(`🪶 TIP by ${name(ev.actor)}`);
      case 'block': return wrap(`🧱 BLOCKED by ${name(ev.actor)}`);
      case 'dig':   return wrap(`🛡 DUG by ${name(ev.actor)}`);
      case 'attack-net':   return wrap(`🧱 ${name(ev.actor)} hits it INTO THE NET (NET!)`);
      case 'attack-out':   return wrap(`❌ ${name(ev.actor)} hits it out of bounds (OUT!)`);
      case 'pass-error':   return wrap(`😬 ${name(ev.actor)} missed the pass!`);
      case 'attack-error': return wrap(`❌ ${name(ev.actor)} attack error`);   // legacy fallback
      case 'point': {
        const teamName = ev.team === 'home' ? match.home.name : match.away.name;
        const flame = (ev.streak >= 5) ? ' 🔥🔥🔥 ON FIRE!' :
                      (ev.streak >= 4) ? ' 🔥🔥 STREAK!' :
                      (ev.streak >= 3) ? ' 🔥 hot streak' : '';
        return `▶ Point ${teamName} (${ev.home}-${ev.away})${flame}`;
      }
      case 'rotation': return `  ↺ ${ev.team === 'home' ? match.home.name : match.away.name} rotates`;
      case 'set-won': {
        const winnerName = ev.team === 'home' ? match.home.name : match.away.name;
        const score = (ev.finalHome != null && ev.finalAway != null)
          ? ` ${ev.finalHome}-${ev.finalAway}` : '';
        return `🏁 Set ${ev.setNumber} to ${winnerName}${score}  (sets: ${ev.setsHome}-${ev.setsAway})`;
      }
      case 'match-won': return `🏆 MATCH WON by ${ev.team === 'home' ? match.home.name : match.away.name}`;
      default: return ev.type;
    }
  }

  function appendLog(text, cls) {
    const panel = document.getElementById('log-panel');
    const div = document.createElement('div');
    div.className = 'log-entry' + (cls ? ' ' + cls : '');
    div.textContent = text;
    panel.appendChild(div);
    scrollLog();
  }
  function scrollLog() {
    const panel = document.getElementById('log-panel');
    panel.scrollTop = panel.scrollHeight;
  }
  function logSeed() {
    appendLog(`Match starting: ${match.home.name} vs ${match.away.name}`);
    appendLog(`Best of 5 sets — first to 3 wins the match`);
    appendLog('');
  }
</script>
