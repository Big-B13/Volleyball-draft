<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Welcome — The Gomi Cup</title><link rel="stylesheet" href="./css/style.css"></head><body><main class="onboarding-shell"><div id="app">Loading…</div></main><script type="module">
import {watchAuth,completeOnboarding} from './js/auth.js';
const lessons=[
 {icon:'🏐',image:'./assets/onboarding/gomi-roster.png',eyebrow:'WELCOME TO THE GOMI CUP',title:'Three clubs. One trophy.',text:'This is your volleyball league hub: discover the clubs, follow the players, build lineups, and fight for the Gomi Cup.'},
 {icon:'🎯',image:'./assets/onboarding/draft-arena.jpg',eyebrow:'HOW THE DRAFT WORKS',title:'Build your squad pick by pick.',text:'Captains take turns selecting players from a shared pool. Player nicknames and stats help them make choices before the big reveal.'},
 {icon:'⚡',image:'./assets/onboarding/chemistry.jpg',eyebrow:'CHEMISTRY MATTERS',title:'A team is more than ratings.',text:'Attack, serve, defense, setting, athleticism, and player chemistry all matter. Find the best team-ups to activate special power-ups.'},
 {icon:'🎮',image:'./assets/onboarding/play-match.jpg',eyebrow:'PLAY THE MATCH',title:'Put your ideas on the court.',text:'Use the standard or 3D match simulator to build lineups, watch the rallies, and see how your club performs.'}
];
const clubs=[
 {id:'strigidae',name:'STRIGIDAE',logo:'./assets/strigidae.png',motto:'The night never blinks.',focus:'Discipline · Court reading · Pressure defense',desc:'Patient, observant, and relentless when the moment arrives.'},
 {id:'otters',name:'KÒRSOU OTTERS',logo:'./assets/otters.png',motto:'Quick hands. Big energy.',focus:'Chemistry · Creativity · Movement',desc:'Fearless rallies, clever combinations, and contagious energy.'},
 {id:'shizuka',name:'SHIZUKA',logo:'./assets/shizuka.png',motto:'Calm above the noise.',focus:'Control · Timing · Precision',desc:'Quiet confidence, clean execution, and perfect timing.'}
];
let session,step=0;const app=document.getElementById('app');const replay=new URLSearchParams(location.search).has('replay');
function dots(){return `<div class="onboarding-progress">${lessons.map((_,i)=>`<span class="${i===step?'active':''}"></span>`).join('')}</div>`}
function renderLesson(){const x=lessons[step],pending=session.profile.status==='pending';app.innerHTML=`<header style="text-align:center"><h1>THE GOMI CUP</h1><p class="tagline">${pending?'A quick guide while your membership is pending.':'A quick guide before you enter the league.'}</p>${dots()}</header><section class="tutorial-art-card"><img class="tutorial-background" src="${x.image}" alt=""><div class="tutorial-copy"><div class="lesson-icon">${x.icon}</div><div class="club-kicker">${x.eyebrow}</div><h2>${x.title}</h2><p>${x.text}</p></div></section><div class="onboard-actions"><button class="secondary" onclick="previous()" ${step===0?'disabled':''}>← Previous</button><span style="color:#94a3b8;align-self:center">${step+1} of ${lessons.length}</span><button onclick="next()">${step===lessons.length-1?(session.profile.favoriteClub?'Enter dashboard →':'Choose your club →'):'Next →'}</button></div>${!pending?'<p style="text-align:center;margin-top:18px"><a href="./index.html" style="color:#94a3b8">Skip introduction</a></p>':''}`}
function renderClubs(){app.innerHTML=`<header style="text-align:center"><h1>CHOOSE YOUR CLUB</h1><p class="tagline">Move across the clubs, discover their identity, and make your choice.</p></header><section class="club-choice">${clubs.map(c=>`<article class="club-choice-panel ${c.id}" data-id="${c.id}" tabindex="0"><div class="club-choice-content"><img class="club-choice-logo" src="${c.logo}" alt="${c.name}"><div><div class="club-choice-name">${c.name}</div><div class="club-choice-info"><p><strong>“${c.motto}”</strong></p><p>${c.desc}</p><p><strong>Focus</strong><br>${c.focus}</p><button onclick="event.stopPropagation();confirmClub('${c.id}')">Choose ${c.name}</button></div></div></div></article>`).join('')}</section><p style="text-align:center;color:#94a3b8;margin-top:16px">On mobile, tap a club to focus it, then choose.</p>`;document.querySelectorAll('.club-choice-panel').forEach(el=>{el.onclick=()=>{document.querySelectorAll('.club-choice-panel').forEach(x=>x.classList.remove('focused'));el.classList.add('focused')};el.onfocus=()=>el.classList.add('focused')})}
window.previous=()=>{step=Math.max(0,step-1);renderLesson()};window.next=()=>{if(step<lessons.length-1){step++;renderLesson();return}if(session.profile.favoriteClub){location.href='./index.html';return}renderClubs()};window.confirmClub=id=>{const c=clubs.find(x=>x.id===id);app.innerHTML=`<section class="card club-theme-${id}" style="max-width:620px;margin:70px auto;text-align:center;border-color:var(--club)"><img src="${c.logo}" style="width:150px;height:150px;object-fit:contain"><h1>JOIN ${c.name}</h1><p class="tagline">“${c.motto}”</p><p style="color:#cbd5e1;line-height:1.55">This sets your profile club and personal dashboard theme. It does not lock a real player card to this club.</p><div class="row-btns"><button class="secondary" onclick="renderClubs()">Keep exploring</button><button onclick="saveClub('${id}')">Confirm ${c.name} →</button></div></section>`};window.saveClub=async id=>{await completeOnboarding(session.user.uid,id);location.href='./index.html'};
watchAuth(s=>{if(!s){location.replace('./login.html');return}session=s;if(s.profile.status==='approved'&&s.profile.onboardingComplete&&!replay){location.replace('./index.html');return}renderLesson()});
</script></body></html>
