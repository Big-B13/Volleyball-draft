<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Choose your club — The Gomi Cup</title><link rel="stylesheet" href="./css/style.css"></head><body><main class="onboarding-shell"><div id="app"><p style="text-align:center;color:#94a3b8">Loading your club introduction…</p></div></main><script type="module">import {watchAuth,completeOnboarding} from './js/auth.js';
const clubs=[{id:'strigidae',name:'Strigidae',emoji:'🦉',logo:'./assets/strigidae.png',tag:'The night never blinks.',text:'Strigidae brings discipline, presence, and a sharp eye for the game. They stay calm under pressure, read the court, and strike when the moment is right.',traits:['Calculated','Resilient','Relentless']},{id:'otters',name:'Kòrsou Otters',emoji:'🦦',logo:'./assets/otters.png',tag:'Quick hands. Big energy.',text:'The Otters play with joy, movement, and fearless creativity. Their chemistry turns chaos into chances and every rally into a fight worth watching.',traits:['Creative','Connected','Fearless']},{id:'shizuka',name:'Shizuka',emoji:'☁️',logo:'./assets/shizuka.png',tag:'Calm above the noise.',text:'Shizuka trusts control, patience, and perfect timing. Quiet does not mean passive — this club waits for the opening, then takes it.',traits:['Composed','Precise','Adaptable']}];let session=null,index=0,chosen=null;const app=document.getElementById('app');function progress(){return '<div class="onboarding-progress">'+clubs.map((_,i)=>`<span class="${i===index?'active':''}"></span>`).join('')+'</div>'}function render(){const c=clubs[index];app.innerHTML=`<header style="text-align:center"><h1><span class="emoji">🏐</span> FIND YOUR CLUB</h1><p class="tagline">Meet the teams. Choose the one that feels like home.</p>${progress()}</header><section class="club-slide club-theme-${c.id}"><img src="${c.logo}" alt="${c.name} logo"><div><div class="club-kicker">${c.emoji} ${c.tag}</div><h2>${c.name}</h2><p>${c.text}</p><div class="club-traits">${c.traits.map(x=>`<span>${x}</span>`).join('')}</div><button onclick="choose('${c.id}')">Choose ${c.name} →</button></div></section><div class="onboard-actions"><button class="secondary" onclick="previous()" ${index===0?'disabled':''}>← Previous</button><span style="color:#94a3b8;align-self:center">${index+1} of ${clubs.length}</span><button class="secondary" onclick="next()" ${index===clubs.length-1?'disabled':''}>Next club →</button></div><p style="text-align:center;margin-top:18px"><a href="./index.html" style="color:#94a3b8">Choose later</a></p>`;}window.next=()=>{index=Math.min(clubs.length-1,index+1);render()};window.previous=()=>{index=Math.max(0,index-1);render()};window.choose=id=>{chosen=clubs.find(c=>c.id===id);app.innerHTML=`<header style="text-align:center"><h1>${chosen.emoji} JOIN ${chosen.name.toUpperCase()}</h1><p class="tagline">One last look before you enter the league.</p></header><section class="card club-theme-${chosen.id}" style="text-align:center;border-color:var(--club)"><img src="${chosen.logo}" alt="" style="width:130px;height:130px;object-fit:contain;margin:0 auto 14px"><h2 style="color:white">Ready to represent ${chosen.name}?</h2><p style="color:#cbd5e1;line-height:1.55">Your club choice personalizes your profile and dashboard. It does not decide which team an actual player card belongs to.</p><div class="row-btns"><button class="secondary" onclick="render()">← Choose another club</button><button onclick="confirmClub()">Confirm ${chosen.name} →</button></div></section>`};window.confirmClub=async()=>{await completeOnboarding(session.user.uid,chosen.id);app.innerHTML=`<section class="card club-theme-${chosen.id}" style="text-align:center;border-color:var(--club);padding:48px 24px"><img src="${chosen.logo}" alt="" style="width:150px;height:150px;object-fit:contain"><h1>WELCOME TO ${chosen.name.toUpperCase()}</h1><p class="tagline" style="margin-bottom:12px">${chosen.tag}</p><p style="color:#cbd5e1;line-height:1.6;max-width:560px;margin:auto">${session.profile.status==='pending'?'Your membership request is now waiting for commissioner approval. You can already explore the league and simulate matches.':'Your profile is ready. Step into the Gomi Cup.'}</p><button class="big" style="max-width:400px;margin:26px auto 0" onclick="location.href='./index.html'">Enter my dashboard →</button></section>`};watchAuth(s=>{if(!s){location.replace('./login.html?next=./onboarding.html');return;}session=s;if(s.profile?.onboardingComplete && !new URLSearchParams(location.search).has('replay')){location.replace('./index.html');return;}render();});</script></body></html>
