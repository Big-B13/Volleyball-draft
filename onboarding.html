<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Welcome — The Gomi Cup</title><link rel="stylesheet" href="./css/style.css"><style>.lesson-icon{font-size:5rem;line-height:1;margin-bottom:16px}.lesson-card{max-width:720px;margin:auto;text-align:center;padding:48px 30px}.lesson-card h2{font-size:2rem;color:#fff}.lesson-card p{color:#cbd5e1;line-height:1.65;max-width:560px;margin:0 auto}</style></head><body><main class="onboarding-shell"><div id="app"><p style="text-align:center;color:#94a3b8">Loading your Gomi Cup introduction…</p></div></main><script type="module">import {watchAuth,completeOnboarding} from './js/auth.js';
const lessons=[{icon:'🏐',image:'./assets/onboarding/gomi-roster.png',eyebrow:'WELCOME TO THE GOMI CUP',title:'Three clubs. One trophy.',text:'This is your volleyball league hub: discover the clubs, follow the players, build lineups, and fight for the Gomi Cup.'},{icon:'🎯',image:'./assets/onboarding/draft-arena.jpg',eyebrow:'HOW THE DRAFT WORKS',title:'Build your squad pick by pick.',text:'Captains take turns selecting players from a shared pool. Player nicknames and stats help them make choices before the big reveal.'},{icon:'⚡',image:'./assets/onboarding/chemistry.jpg',eyebrow:'CHEMISTRY MATTERS',title:'A team is more than ratings.',text:'Attack, serve, defense, setting, athleticism, and player chemistry all matter. A smart, balanced team can surprise a stronger one. Also find the best team-ups for special power-ups.'},{icon:'🎮',image:'./assets/onboarding/play-match.jpg',eyebrow:'PLAY THE MATCH',title:'Put your ideas on the court.',text:'Use the standard or 3D match simulator to build lineups, watch the rallies, and see how your club performs.'}];
const clubs=[{id:'strigidae',name:'Strigidae',emoji:'🦉',logo:'./assets/strigidae.png',tag:'The night never blinks.',text:'Strigidae brings discipline, presence, and a sharp eye for the game. They stay calm under pressure, read the court, and strike when the moment is right.',traits:['Calculated','Resilient','Relentless']},{id:'otters',name:'Kòrsou Otters',emoji:'🦦',logo:'./assets/otters.png',tag:'Quick hands. Big energy.',text:'The Otters play with joy, movement, and fearless creativity. Their chemistry turns chaos into chances and every rally into a fight worth watching.',traits:['Creative','Connected','Fearless']},{id:'shizuka',name:'Shizuka',emoji:'☁️',logo:'./assets/shizuka.png',tag:'Calm above the noise.',text:'Shizuka trusts control, patience, and perfect timing. Quiet does not mean passive — this club waits for the opening, then takes it.',traits:['Composed','Precise','Adaptable']}];
const params=new URLSearchParams(location.search);const guestMode=params.has('guest');const clubsOnly=params.has('clubs');let session=null,step=clubsOnly?lessons.length:0,chosen=null;const app=document.getElementById('app');const total=guestMode?lessons.length:lessons.length+clubs.length;function dots(){return '<div class="onboarding-progress">'+Array.from({length:total},(_,i)=>`<span class="${i===step?'active':''}"></span>`).join('')+'</div>'}function nav(){const isLastLesson=step===lessons.length-1;const forward=guestMode&&isLastLesson?'<button onclick="getAccount()">Create an account →</button>':step<lessons.length?`<button onclick="next()">${isLastLesson?'Meet the clubs →':'Next →'}</button>`:`<button class="secondary" onclick="next()" ${step===total-1?'disabled':''}>Next club →</button>`;return `<div class="onboard-actions"><button class="secondary" onclick="previous()" ${step===0?'disabled':''}>← Previous</button><span style="color:#94a3b8;align-self:center">${step+1} of ${total}</span>${forward}</div>`}function render(){if(step<lessons.length){const x=lessons[step];app.innerHTML=`<header style="text-align:center"><h1>THE GOMI CUP</h1><p class="tagline">A quick introduction before you choose your club.</p>${dots()}</header><section class="tutorial-art-card" style="--tutorial-image:url('${x.image}')"><div class="tutorial-copy"><div class="lesson-icon">${x.icon}</div><div class="club-kicker">${x.eyebrow}</div><h2>${x.title}</h2><p>${x.text}</p></div></section>${nav()}<p style="text-align:center;margin-top:18px"><a href="#" onclick="skipTutorial();return false" style="color:#94a3b8">${guestMode?'Skip tutorial → create an account':'Skip tutorial → choose my club'}</a></p>`;return;}const c=clubs[step-lessons.length];app.innerHTML=`<header style="text-align:center"><h1><span class="emoji">🏐</span> FIND YOUR CLUB</h1><p class="tagline">You know the game. Now choose the club that feels like home.</p>${dots()}</header><section class="club-slide club-theme-${c.id}"><img src="${c.logo}" alt="${c.name} logo"><div><div class="club-kicker">${c.emoji} ${c.tag}</div><h2>${c.name}</h2><p>${c.text}</p><div class="club-traits">${c.traits.map(x=>`<span>${x}</span>`).join('')}</div><button onclick="choose('${c.id}')">Choose ${c.name} →</button></div></section>${nav()}<p style="text-align:center;margin-top:18px"><a href="./index.html" style="color:#94a3b8">Choose later</a></p>`}window.getAccount=()=>{location.href='./login.html?afterTutorial=1'};window.next=()=>{step=Math.min(total-1,step+1);render()};window.previous=()=>{step=Math.max(0,step-1);render()};window.skipTutorial=()=>{if(guestMode){window.getAccount();return;}step=lessons.length;render()};window.choose=id=>{chosen=clubs.find(c=>c.id===id);app.innerHTML=`<header style="text-align:center"><h1>${chosen.emoji} JOIN ${chosen.name.toUpperCase()}</h1><p class="tagline">One last look before you enter the league.</p></header><section class="card club-theme-${chosen.id}" style="text-align:center;border-color:var(--club)"><img src="${chosen.logo}" alt="" style="width:130px;height:130px;object-fit:contain;margin:0 auto 14px"><h2 style="color:white">Ready to represent ${chosen.name}?</h2><p style="color:#cbd5e1;line-height:1.55">Your club choice personalizes your profile and dashboard. It does not decide which team an actual player card belongs to.</p><div class="row-btns"><button class="secondary" onclick="render()">← Choose another club</button><button onclick="confirmClub()">Confirm ${chosen.name} →</button></div></section>`};window.confirmClub=async()=>{await completeOnboarding(session.user.uid,chosen.id);app.innerHTML=`<section class="card club-theme-${chosen.id}" style="text-align:center;border-color:var(--club);padding:48px 24px"><img src="${chosen.logo}" alt="" style="width:150px;height:150px;object-fit:contain"><h1>WELCOME TO ${chosen.name.toUpperCase()}</h1><p class="tagline" style="margin-bottom:12px">${chosen.tag}</p><p style="color:#cbd5e1;line-height:1.6;max-width:560px;margin:auto">${session.profile.status==='pending'?'Your membership request is waiting for commissioner approval. You can already explore the league and simulate matches.':'Your profile is ready. Step into the Gomi Cup.'}</p><button class="big" style="max-width:400px;margin:26px auto 0" onclick="location.href='./index.html'">Enter my dashboard →</button></section>`};watchAuth(s=>{if(!s){if(guestMode){render();return;}location.replace('./login.html?next=./onboarding.html');return;}session=s;if(s.profile?.onboardingComplete&&!new URLSearchParams(location.search).has('replay')){location.replace('./index.html');return;}render()});</script></body></html>
