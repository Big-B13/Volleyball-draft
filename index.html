<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Gomi Cup</title><link rel="stylesheet" href="./css/style.css"></head><body><main class="container" id="app"><div style="text-align:center;padding:80px 0;color:#94a3b8">Loading The Gomi Cup…</div></main><script type="module">import {watchAuth,renderAuthBadge} from './js/auth.js';
const club={strigidae:{name:'Strigidae',emoji:'🦉',logo:'./assets/strigidae.png',color:'#dc2626'},otters:{name:'Kòrsou Otters',emoji:'🦦',logo:'./assets/otters.png',color:'#16a34a'},shizuka:{name:'Shizuka',emoji:'☁️',logo:'./assets/shizuka.png',color:'#2563eb'}};const app=document.getElementById('app');const tile=(href,icon,title,text)=>`<a class="dashboard-tile" href="${href}"><div style="font-size:2rem;margin-bottom:8px">${icon}</div><h3>${title}</h3><p style="color:#94a3b8;font-size:.9rem;line-height:1.45">${text}</p></a>`;function guest(){document.body.style.padding='0';app.className='retro-start';app.innerHTML=`<div class="retro-corner">The Gomi Cup · 2026</div><img class="retro-start-art" src="./assets/onboarding/gomi-roster.png" alt="Gomi Cup players"><button class="retro-start-button" onclick="location.href='./onboarding.html?guest=1'">▶ Press to start your adventure</button>`}function dashboard(p){const c=club[p.favoriteClub]||{name:'The Gomi Cup',emoji:'🏐',logo:'./assets/volleyball.png',color:'#fbbf24'};const pending=p.status==='pending';const declined=p.status==='declined';app.className=`container club-theme-${p.favoriteClub||''}`;app.innerHTML=`<div id="auth-strip" style="text-align:right;margin-bottom:8px"></div><header style="text-align:center;padding:18px 0 26px;border-bottom:1px solid #334155;margin-bottom:22px"><img src="${c.logo}" alt="" style="width:70px;height:70px;object-fit:contain"><h1>${c.emoji} ${pending?'WELCOME TO':'MY'} ${c.name.toUpperCase()}</h1><p class="tagline">${pending?'Your Gomi Cup journey has started.':'Your personal Gomi Cup dashboard.'}</p></header>${pending?'<div class="pending-banner"><strong>⏳ Membership pending</strong><br>You can explore clubs, player content, standings, and both match simulators while a commissioner reviews your request. Draft captain and admin actions unlock after approval.</div>':''}${declined?'<div class="warning"><strong>Your membership request was not approved.</strong> You can still contact the commissioner if you think this was a mistake.</div>':''}<section class="dashboard-grid">${tile('./team-builder.html','✨','Dream Team','Build, analyse, and save your perfect squad.')}${tile('./match-sim.html','🎮','Play a match','Build lineups and simulate a Gomi Cup match.')}${tile('./match-sim-3d.html','🕹️','3D match sim','Watch your volleyball game play out in 3D.')}${tile('./clubs.html','🛡️','Explore the clubs','Stories, identities, and the teams behind the cup.')}${tile('./standings.html','📊','League table','Follow standings, results, and the race for the trophy.')}${tile('./cards.html','🃏','Player cards','Browse the roster and player cards.')}${tile('./player-stats.html','🌟','Player stats','See the numbers behind the players.')}${!pending?tile('./draft.html','🎯','Enter a draft','Join a live draft using your room details.'):''}${p.role==='commissioner'?tile('./admin.html','👑','Commissioner panel','Review member requests and manage the league.'):''}</section><div class="row-btns" style="margin-top:22px"><a href="./onboarding.html?replay=1"><button class="secondary">🏐 Review clubs / how to play</button></a></div>`;renderAuthBadge(document.getElementById('auth-strip'),p)}watchAuth(s=>{if(!s){guest();return;}if(!s.profile?.onboardingComplete){location.replace('./onboarding.html');return;}dashboard(s.profile)});</script></body></html>
