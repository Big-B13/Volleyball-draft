<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club — The Gomi Cup</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  nav.topnav { display:flex; gap:12px; justify-content:center; margin-bottom:24px; flex-wrap:wrap; }
  nav.topnav a { color:#cbd5e1; text-decoration:none; padding:8px 16px; border-radius:6px; background:rgba(30,41,59,0.6); font-size:0.9rem; transition:all 0.2s; }
  nav.topnav a:hover, nav.topnav a.active { background:#fbbf24; color:#0f172a; }

  .club-header {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 32px;
    align-items: center;
    padding: 40px 28px;
    border-radius: 14px;
    margin-bottom: 24px;
    border-top: 6px solid;
    position: relative;
    overflow: hidden;
  }
  .club-header::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at top right, currentColor 0%, transparent 60%);
    opacity: 0.12; pointer-events:none;
  }
  .club-header img.logo {
    max-width: 240px; max-height: 240px;
    filter: drop-shadow(0 0 24px currentColor);
    position: relative; z-index: 1;
  }
  .club-header h1 { font-size: 3rem; margin-bottom: 6px; color: #fff; -webkit-text-fill-color:#fff; }
  .club-header .tagline { color: #e2e8f0; font-size: 1.2rem; font-style: italic; margin-bottom: 14px; }
  .club-header .motto {
    display: inline-block;
    padding: 10px 18px;
    background: rgba(0,0,0,0.55);
    border-radius: 8px;
    font-size: 1.05rem;
    letter-spacing: 3px;
    font-weight: 600;
  }

  .lore-block {
    padding: 28px;
    background: rgba(30, 41, 59, 0.7);
    border-radius: 12px;
    margin-bottom: 20px;
    border-left: 4px solid;
  }
  .lore-block h2 { font-size: 1.3rem; margin-bottom: 12px; letter-spacing: 1px; }
  .lore-block p { color: #e2e8f0; line-height: 1.75; font-size: 1.02rem; }

  .captain-block {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 28px;
    background: rgba(15, 23, 42, 0.9);
    border-radius: 12px;
    margin-bottom: 20px;
    border-top: 4px solid;
  }
  .captain-block .cap-title { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; }
  .captain-block h2 { font-size: 2rem; margin-bottom: 2px; color: #fff; }
  .captain-block .role { color: #fbbf24; margin-bottom: 4px; font-weight: 700; letter-spacing: 1px; }
  .captain-block .subtitle { color: #cbd5e1; font-style: italic; margin-bottom: 12px; }
  .captain-block p { color: #e2e8f0; line-height: 1.75; font-size: 1.02rem; }

  .jersey-block {
    padding: 28px;
    background: rgba(15, 23, 42, 0.5);
    border-radius: 12px;
    margin-bottom: 20px;
    text-align: center;
  }
  .jersey-block h2 { color: #fbbf24; margin-bottom: 20px; }
  .house-members { padding:28px; background:rgba(15,23,42,.72); border-radius:12px; margin-bottom:22px; border-top:4px solid; }
  .house-members h2 { margin-bottom:5px; }.house-members .intro{color:#94a3b8;font-size:.88rem;margin-bottom:16px}
  .house-member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}.house-member{display:block;text-decoration:none;color:#e2e8f0;padding:12px;background:rgba(30,41,59,.72);border:1px solid #334155;border-radius:9px}.house-member:hover{border-color:var(--club);transform:translateY(-2px)}.house-member .member-name{font-weight:800}.house-member .member-meta{font-size:.75rem;color:#94a3b8;margin-top:4px}.house-member .member-status{font-size:.68rem;letter-spacing:1px;font-weight:800;margin-top:8px;color:#fbbf24}.house-members .empty{color:#64748b;text-align:center;padding:15px}

  .jersey-block img {
    max-width: 100%;
    max-height: 480px;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }

  .other-clubs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 24px;
  }
  .other-clubs a {
    text-decoration: none; color: inherit;
    padding: 16px; border-radius: 10px;
    background: rgba(30,41,59,0.7);
    display: flex; align-items: center; gap: 12px;
    border-top: 3px solid;
    transition: transform 0.2s;
  }
  .other-clubs a:hover { transform: translateY(-2px); }
  .other-clubs img { height: 50px; }
  .other-clubs strong { display: block; color: #fff; }
  .other-clubs span { color: #94a3b8; font-size: 0.85rem; }

  @media (max-width: 720px) {
    .club-header { grid-template-columns: 1fr; text-align: center; }
    .club-header img.logo { margin: 0 auto; }
    .club-header h1 { font-size: 2rem; }
    .other-clubs { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <nav class="topnav">
    <a href="../index.html">🏠 Home</a>
    <a href="../league.html">🏆 League</a>
    <a href="../clubs.html">🛡️ Clubs</a>
  </nav>

  <div id="club-content"></div>
</div>

<script type="module">
  import { CLUBS } from "../js/lore.js";
  import { db, ref, get } from "../js/firebase-init.js";

  // Read club id from filename OR from ?club=xxx
  const params = new URLSearchParams(location.search);
  let clubId = params.get('club');
  if (!clubId) {
    const path = location.pathname.split('/').pop().replace('.html','');
    if (CLUBS[path]) clubId = path;
  }
  const c = CLUBS[clubId];
  if (!c) {
    document.getElementById('club-content').innerHTML =
      '<div class="warning">Club not found. <a href="../clubs.html">← Back to clubs</a></div>';
  } else {
    document.title = `${c.name} — The Gomi Cup`;
    const others = Object.values(CLUBS).filter(x => x.id !== c.id);
    document.getElementById('club-content').innerHTML = `
      <div class="club-header" style="border-top-color:${c.colorPrimary};
           background:linear-gradient(135deg, ${c.colorPrimary}22, #1e293b); color:${c.colorPrimary};">
        <div><img class="logo" src="../${c.logoUrl.replace('./','')}" alt="${c.name}"></div>
        <div style="position:relative; z-index:1;">
          <h1>${c.name}</h1>
          <div class="tagline">${c.tagline}</div>
          <div class="motto" style="color:${c.colorPrimary};">${c.motto.kanji}<br><span style="font-size:0.85rem; letter-spacing:2px; color:#cbd5e1;">${c.motto.english}</span></div>
        </div>
      </div>

      <div class="lore-block" style="border-left-color:${c.colorPrimary};">
        <h2 style="color:${c.colorPrimary};">Identity</h2>
        <p>${c.identity}</p>
      </div>

      <div class="lore-block" style="border-left-color:${c.colorPrimary};">
        <h2 style="color:${c.colorPrimary};">Philosophy of Play</h2>
        <p>${c.philosophy}</p>
      </div>

      <div class="captain-block" style="border-top-color:${c.colorPrimary};">
        <div class="cap-title">Captain</div>
        <h2>${c.captain.name}</h2>
        <div class="role" style="color:${c.colorPrimary};">${c.captain.role.toUpperCase()}</div>
        <div class="subtitle">"${c.captain.title}"</div>
        <p>${c.captain.bio}</p>
      </div>

      <div class="jersey-block">
        <h2 style="color:${c.colorPrimary};">The Kit</h2>
        <img src="../${c.jerseyUrl.replace('./','')}" alt="${c.name} jersey">
      </div>

      <section class="house-members" id="house-members" style="border-top-color:${c.colorPrimary}; --club:${c.colorPrimary};">
        <h2 style="color:${c.colorPrimary};">${c.name} House Members</h2>
        <p class="intro">These people chose ${c.name} as their house. This is separate from any team they are drafted to in a season.</p>
        <div class="empty">Loading house members…</div>
      </section>

      <h3 style="text-align:center; color:#94a3b8; margin-top:32px; font-size:0.85rem; letter-spacing:3px; text-transform:uppercase;">The Other Houses</h3>
      <div class="other-clubs">
        ${others.map(o => `
          <a href="./${o.id}.html" style="border-top-color:${o.colorPrimary};">
            <img src="../${o.logoUrl.replace('./','')}" alt="">
            <div>
              <strong>${o.name}</strong>
              <span>${o.tagline}</span>
            </div>
          </a>
        `).join('')}
      </div>
    `;
    const memberBox = document.getElementById('house-members');
    try {
      const users = (await get(ref(db, 'users'))).val() || {};
      const members = Object.values(users).filter(u => u.favoriteClub === c.id);
      const clean = v => String(v || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
      memberBox.querySelector('.empty')?.remove();
      memberBox.insertAdjacentHTML('beforeend', members.length ? `<div class="house-member-grid">${members.map(m => {
        const name=clean(m.displayName || m.username || 'New member'); const linked=m.linkedPlayerId ? ` · Player: ${clean(m.linkedPlayerId)}` : '';
        const pending=m.status === 'pending';
        return `<a class="house-member" href="${m.linkedPlayerId ? '../player.html?id='+encodeURIComponent(m.linkedPlayerId) : '#'}"><div class="member-name">${name}</div><div class="member-meta">${linked || 'House supporter'}</div><div class="member-status">${pending ? 'NEW RECRUIT' : 'HOUSE MEMBER'}</div></a>`;
      }).join('')}</div>` : '<div class="empty">No one has chosen this house yet. Be the first.</div>');
    } catch (e) { memberBox.innerHTML += '<div class="empty">House members are unavailable right now.</div>'; }
  }
</script>
</body>
</html>
